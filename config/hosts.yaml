# Endpoint config per target host.
# Override via env: LLAMA_URL, SSH_HOST, BACKEND
#
# Backend:
#   Vulkan is the sole production backend. ROCm was DISABLED 2026-06-07 (see below).
#   The harness auto-detects builds via scripts/llm2/backends.sh (now vulkan-only).

rose:
   label: "rose / RX 7900 XT (20 GiB)"
   gpu: "RX 7900 XT"                  # slugged into result CSV filenames (→ rx7900xt)
   vram_total_mib: 20464              # usable VRAM (rocm-reported 21458059264 B); free-at-maxctx baseline
   llamacpp: "${LLAMA_URL:-http://192.168.1.120:8090}"
   ssh_host: "${SSH_HOST:-llm2}"
   port: 8090
   # llama.cpp backend binaries on llm2:
   backends:
      vulkan:
         bin: "~/llama.cpp/build-vulkan/bin/llama-server"
      # rocm: DISABLED 2026-06-07 — Vulkan is the sole production backend. Build retained
      #   on llm2 (~/llama.cpp/build-rocm, ~301M) but no longer offered as selectable.
      #   To re-enable, restore this entry + start-server.sh rocm case + backends.sh.
      #   (ROCm q8_0 KV is +22% at depth for Qwen3.6-35B — see results/kv-quant-sweep-rocm.md.)
      #   rocm:
      #      bin: "~/llama.cpp/build-rocm/bin/llama-server"
   # Remote benchmark deploy path (git pull target)
   remote_dir: "~/llm-bench"
   # VRAM monitoring command (works regardless of inference backend)
   vram_cmd: "rocm-smi --showmeminfo vram --json"

# ── m1 / Apple M1 Mac — OptiQ (MLX) ──────────────────────────────────────────────
# A persistent OptiQ daemon (`optiq serve`) on the M1 Mac. Selected only with `--target m1`;
# the bench-run engine filter keeps MLX models off rose and vice-versa.
# engine: optiq routes the model server to runners/optiq-server.mjs (no-op lifecycle: the daemon
# is long-lived and has no server-reload context flag — it is NOT launched or killed by the harness,
# only health-checked + model-selected via GET /v1/models). OptiQ serves single-model by default, so
# the request `model` field is just a label (any value serves the loaded --model).
# Unified memory: NO VRAM readout (no rocm-smi), so vram_cmd is intentionally absent —
# kv_per_tok / fit_ctx skip cleanly and agent_ctx uses the client-driven MLX probe.
# DEPLOYMENT: bench-run runs ON llm1 from the ~/llm-bench git checkout (deploy via commit→push→
# `scripts/deploy.sh --host llm1`), talking to the local OptiQ daemon — hence the loopback URL.
# The daemon is launched separately on llm1 by scripts/llm1/serve.sh. See README §4a.
# (Replaced RapidMLX 2026-07-22; the archived RapidMLX runner/serve script live under archive/rapidmlx/.)
m1:
   label: "m1 / Apple M1 (32 GB unified)"
   gpu: "M1"
   engine: optiq
   backend: optiq                     # distinct from purged omlx (backend: mlx) and archived rapidmlx rows
   mlx: "${MLX_URL:-http://127.0.0.1:8080}"   # bench-run runs locally on llm1 → loopback
   ssh_host: "${SSH_HOST_M1:-llm1}"
   port: 8080
   remote_dir: "~/llm-bench"
