# Model matrix for llm-bench.
#
# Fields per model:
#   hf_repo          HuggingFace repo (passed to llama-server --hf-repo)
#   hf_file          GGUF filename inside the repo (--hf-file)
#   label            Human-readable label for results tables
#   family           Model family — must match a key in sampling_matrix
#   type             dense | moe
#   think            none | optional | required | reasoning
#                      none       = no thinking mode
#                      optional   = supports think:true/false (Qwen3, Qwen3.6, Gemma4, Nemotron)
#                      required   = always outputs think tags (DeepSeek-R1 distill)
#                      reasoning  = always reasons in reasoning_content field (LFM2.5)
#   think_control    enable_thinking (default) | system_keyword
#                      enable_thinking  = chat_template_kwargs.enable_thinking
#                      system_keyword   = /think or /no_think prepended to system message
#   tools            true | false
#   native_max_ctx   Documented maximum context window (tokens). Caps the binary search.
#   ctx_cap          Hard override cap (OOM/RoPE ceiling discovered empirically)
#   kv_bytes_per_token  Q8_0 KV cache bytes per input token (used to estimate hi bound)
#   extra_flags      Server-launch-only flags (speculative decoding, backend tweaks).
#                    NO sampling keys here — those belong exclusively in sampling_matrix.
#   benches          Applicable benchmark suites:
#                      triage | reasoning | toolcalling | toolcalling_decay | longctx
#                      summarization | speed | maxctx | docqa
#   notes            Caveats

models:

   # ── Qwen3-Coder 30B ──────────────────────────────────────────────────────────
   # NO thinking mode (model never generates <think> blocks).
   # Native ctx: 262,144 tokens with YaRN (per HF model card).
   - hf_repo: unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF
     hf_file: Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf
     label: "Qwen3-Coder-30B Q4_K_XL"
     family: qwen3-coder
     type: moe
     think: none
     tools: true
     native_max_ctx: 262144
     kv_bytes_per_token: 49152
     extra_flags: {}
     benches: [triage, toolcalling, summarization, docqa, speed, maxctx]
     notes: "No think mode. repeat_penalty in sampling_matrix."

   # ── Qwen3-30B-A3B-Instruct-2507 ──────────────────────────────────────────────
   # Non-thinking only: 2507-Instruct never emits <think> blocks.
   # Native ctx: 262,144 tokens (per HF model card).
   - hf_repo: unsloth/Qwen3-30B-A3B-Instruct-2507-GGUF
     hf_file: Qwen3-30B-A3B-Instruct-2507-UD-Q4_K_XL.gguf
     label: "Qwen3-30B-2507 Q4_K_XL"
     family: qwen3
     type: moe
     think: none
     tools: true
     native_max_ctx: 262144
     kv_bytes_per_token: 49152
     extra_flags: {}
     benches: [triage, reasoning, toolcalling, summarization, docqa, speed, maxctx]

   - hf_repo: unsloth/Qwen3-30B-A3B-Instruct-2507-GGUF
     hf_file: Qwen3-30B-A3B-Instruct-2507-IQ4_XS.gguf
     label: "Qwen3-30B-2507 IQ4_XS"
     family: qwen3
     type: moe
     think: none
     tools: true
     native_max_ctx: 262144
     ctx_cap: 81920
     kv_bytes_per_token: 49152
     extra_flags: {}
     benches: [triage, reasoning, toolcalling, summarization, docqa, speed, maxctx]

   # ── Qwen3-14B Q5_K_M ────────────────────────────────────────────────────────
   # Hybrid: runs both nothi and think passes.
   # Native ctx: 32,768 tokens; 131,072 with YaRN.
   - hf_repo: unsloth/Qwen3-14B-GGUF
     hf_file: Qwen3-14B-Q5_K_M.gguf
     label: "Qwen3-14B Q5_K_M"
     family: qwen3
     type: dense
     think: optional
     tools: true
     native_max_ctx: 32768
     ctx_cap: 40960
     kv_bytes_per_token: 24576
     extra_flags: {}
     benches: [triage, reasoning, toolcalling, toolcalling_decay, summarization, docqa, speed, maxctx]

   # ── Qwen3.6-35B-A3B IQ4_XS ──────────────────────────────────────────────────
   # Hybrid: runs both nothi and think passes.
   # Native ctx: 262,144 tokens (genuine, not YaRN-extended).
   # MTP repo includes the speculative-draft head required for --spec-type draft-mtp.
   - hf_repo: unsloth/Qwen3.6-35B-A3B-MTP-GGUF
     hf_file: Qwen3.6-35B-A3B-UD-IQ4_XS.gguf
     label: "Qwen3.6-35B IQ4_XS"
     family: qwen3.6
     type: moe
     think: optional
     tools: true
     native_max_ctx: 262144
     kv_bytes_per_token: 49152
     extra_flags:
        spec-type: draft-mtp
        spec-draft-n-max: 4
     benches: [triage, reasoning, toolcalling, summarization, docqa, speed, maxctx]
     notes: "MTP speculative draft; smoke will catch if Vulkan build lacks support."

   # ── Gemma4-E4B ───────────────────────────────────────────────────────────────
   # Hybrid: runs both nothi and think passes.
   # Google unified sampling: same params for ALL tasks and both think states.
   # Reasoning trace format: <|channel>thought … <channel|>  (NOT <think> tags).
   - hf_repo: unsloth/gemma-4-E4B-it-GGUF
     hf_file: gemma-4-E4B-it-Q8_0.gguf
     label: "Gemma4-E4B Q8_0"
     family: gemma4
     type: moe
     think: optional
     think_control: enable_thinking
     tools: true   # native function-calling (Google docs list gemma-4-E4B-it)
     native_max_ctx: 128000
     kv_bytes_per_token: 16384
     extra_flags: {}
     benches: [triage, reasoning, toolcalling, summarization, docqa, speed, maxctx]

   - hf_repo: unsloth/gemma-4-E4B-it-GGUF
     hf_file: gemma-4-E4B-it-Q5_K_M.gguf
     label: "Gemma4-E4B Q5_K_M"
     family: gemma4
     type: moe
     think: optional
     think_control: enable_thinking
     tools: true
     native_max_ctx: 128000
     kv_bytes_per_token: 16384
     extra_flags: {}
     benches: [triage, reasoning, toolcalling, summarization, docqa, speed, maxctx]

   # ── Gemma4-26B-A4B ───────────────────────────────────────────────────────────
   # Hybrid: runs both nothi and think passes. ~16.9 GB weights.
   # Same sampling + think mechanism as E4B; same channel-format reasoning trace.
   - hf_repo: unsloth/gemma-4-26B-A4B-it-GGUF
     hf_file: gemma-4-26B-A4B-it-UD-Q4_K_M.gguf
     label: "Gemma4-26B Q4_K_M"
     family: gemma4
     type: moe
     think: optional
     think_control: enable_thinking
     tools: true
     native_max_ctx: 128000
     kv_bytes_per_token: 16384
     extra_flags: {}
     benches: [triage, reasoning, toolcalling, summarization, docqa, speed, maxctx]

   # ── Gemma4-12B (dense "unified" — encoder-free multimodal, run text-only) ──────
   # Released 2026-06-02. Dense 12B, hybrid think, native FC; ~8.4 GB at Q5_K_M.
   # No mmproj passed → vision/audio towers unused; text-only benchmark.
   - hf_repo: unsloth/gemma-4-12b-it-GGUF
     hf_file: gemma-4-12b-it-Q5_K_M.gguf
     label: "Gemma4-12B Q5_K_M"
     family: gemma4
     type: dense
     think: optional
     think_control: enable_thinking
     tools: true
     native_max_ctx: 256000
     kv_bytes_per_token: 16384
     extra_flags: {}
     benches: [triage, reasoning, toolcalling, summarization, docqa, speed, maxctx]

   # ── LFM2.5-8B-A1B ────────────────────────────────────────────────────────────
   # Always-reasoning: outputs to reasoning_content field, not content.
   # Only 6 of 24 layers are attention → tiny KV footprint.
   - hf_repo: LiquidAI/LFM2.5-8B-A1B-GGUF
     hf_file: LFM2.5-8B-A1B-Q5_K_M.gguf
     label: "LFM2.5-8B Q5_K_M"
     family: lfm2.5
     type: dense
     think: reasoning
     tools: true   # native tool-calling; emits Pythonic calls by default (may grade low vs JSON grader)
     native_max_ctx: 128000
     ctx_cap: 131072
     kv_bytes_per_token: 8192
     extra_flags: {}
     benches: [reasoning, toolcalling, summarization, docqa, speed, maxctx]
     notes: "reasoning_content merged by llm client. repeat_penalty in sampling_matrix."

   # ── GLM-4.7-Flash (MoE 30B-A3B, 200K ctx) ─────────────────────────────────────
   # Hybrid think; native function-calling; non-mamba (no #24081 risk). IQ4_XS ≈16.3GB.
   - hf_repo: unsloth/GLM-4.7-Flash-GGUF
     hf_file: GLM-4.7-Flash-IQ4_XS.gguf
     label: "GLM-4.7-Flash IQ4_XS"
     family: glm
     type: moe
     think: optional
     think_control: enable_thinking
     tools: true
     native_max_ctx: 200000
     kv_bytes_per_token: 16384
     extra_flags: {}
     benches: [triage, reasoning, toolcalling, summarization, docqa, speed, maxctx]

   # ── Granite-4.0-H-Tiny (MoE 7B-A1B, mamba-hybrid) ─────────────────────────────
   # IBM: strong function-calling; no native think toggle. ≈5GB → big KV headroom.
   - hf_repo: unsloth/granite-4.0-h-tiny-GGUF
     hf_file: granite-4.0-h-tiny-Q5_K_M.gguf
     label: "Granite-4-H-Tiny Q5_K_M"
     family: granite
     type: moe
     think: none
     tools: true
     native_max_ctx: 128000
     kv_bytes_per_token: 8192
     extra_flags: {}
     benches: [triage, toolcalling, summarization, docqa, speed, maxctx]

   # ── Nemotron-3-Nano-4B (mamba-hybrid) ─────────────────────────────────────────
   # Small v3 Nemotron; Q8_0 ≈4.3GB → big KV headroom for long context. Same bug
   # class as the family: no_schema set; tool-calling blocked (llama.cpp#24081);
   # mamba-base.cpp assert (#20570) may crash on load.
   - hf_repo: bartowski/nvidia_Nemotron-3-Nano-4B-GGUF
     hf_file: nvidia_Nemotron-3-Nano-4B-Q8_0.gguf
     label: "Nemotron-3-Nano-4B Q8_0"
     family: nemotron3
     type: dense
     think: optional
     think_control: system_keyword
     tools: false
     capability_note: "tool-calling + json_schema blocked by llama.cpp#24081 class; mamba assert risk #20570"
     no_schema: true
     native_max_ctx: 128000
     kv_bytes_per_token: 16384
     extra_flags: {}
     benches: [triage, reasoning, summarization, docqa, speed, maxctx]

   # ── GLM-4.1V-9B-Thinking (vision-LM, run text-only) ───────────────────────────
   # Always-thinking; native FC. No mmproj → vision tower unused, text-only benchmark.
   - hf_repo: unsloth/GLM-4.1V-9B-Thinking-GGUF
     hf_file: GLM-4.1V-9B-Thinking-Q5_K_M.gguf
     label: "GLM-4.1V-9B-Thinking Q5_K_M"
     family: glm
     type: dense
     think: required
     tools: true
     native_max_ctx: 65536
     kv_bytes_per_token: 16384
     extra_flags: {}
     benches: [triage, reasoning, toolcalling, summarization, docqa, speed, maxctx]


# ── Sampling matrix ───────────────────────────────────────────────────────────────
# Read by shared/llm/sampling.mjs. Authoritative source for ALL per-request sampling.
# Keyed by model family (matches the `family:` field above).
#
# Structure per family:
#   default:   shared base params applied to all passes (non-thinking models use this alone)
#   think:     delta merged on top of default for think=true passes
#   no_think:  delta merged on top of default for think=false passes
#
# Use-case sub-keys (triage, reasoning, toolcalling, summarization, docqa, longctx, speed)
# override base params for that bench only. State block takes precedence over default.
#
# extra_flags in model entries above are server-launch flags ONLY (speculative decoding etc.).
# All sampling params belong here, including presence_penalty and repeat_penalty.
# There are no fallbacks — every family is explicitly tuned.
#
# Sources (verified from primary HuggingFace model cards, June 2026):
#   qwen3:       https://huggingface.co/Qwen/Qwen3-30B-A3B
#   qwen3-coder: https://huggingface.co/Qwen/Qwen3-Coder-30B-A3B-Instruct
#   qwen3.6:     https://huggingface.co/Qwen/Qwen3.6-35B-A3B
#   gemma4:      https://ai.google.dev/gemma/docs/core/model_card_4
#   lfm2.5:      https://huggingface.co/LiquidAI/LFM2.5-8B-A1B
#   nemotron:    https://huggingface.co/nvidia/NVIDIA-Nemotron-Nano-12B-v2

sampling_matrix:

   # ── Qwen3 (30B-2507 non-thinking; 14B hybrid) ─────────────────────────────
   # default = no_think base; think delta overrides temp/top_p only.
   # reasoning bench: even in no_think, use higher temp for chain-of-thought prompts.
   qwen3:
      default:
         temperature: 0.7
         top_p: 0.8
         top_k: 20
         min_p: 0
         reasoning:
            temperature: 0.6
            top_p: 0.95
         longctx:
            temperature: 0.1
            top_p: 0.9
      think:
         temperature: 0.6
         top_p: 0.95

   # ── Qwen3.6 (35B-A3B MoE) ─────────────────────────────────────────────────
   # presence_penalty=1.5 shared; think uses temp=1.0, no_think uses temp=0.7.
   # docqa in think mode: lower temp for precise arithmetic.
   qwen3.6:
      default:
         top_k: 20
         min_p: 0
         presence_penalty: 1.5
      think:
         temperature: 1.0
         top_p: 0.95
         docqa:
            temperature: 0.6
            top_p: 0.95
      no_think:
         temperature: 0.7
         top_p: 0.8

   # ── Qwen3-Coder (30B-A3B — non-thinking) ──────────────────────────────────
   qwen3-coder:
      default:
         temperature: 0.7
         top_p: 0.8
         top_k: 20
         min_p: 0
         repeat_penalty: 1.05
         longctx:
            temperature: 0.1
            top_p: 0.9

   # ── Gemma 4 (E4B and 26B-A4B) ─────────────────────────────────────────────
   # Google recommends identical params for all tasks and both think states.
   gemma4:
      default:
         temperature: 1.0
         top_p: 0.95
         top_k: 64

   # ── Nemotron Nano 12B v2 ───────────────────────────────────────────────────
   # no_think = greedy (temp=0) per NVIDIA model card; think and no_think differ
   # entirely so no shared default base.
   nemotron:
      think:
         temperature: 0.6
         top_p: 0.95
      # NVIDIA recommends greedy (temp 0) for no_think, but temp 0 deterministically
      # triggers the llama.cpp peg-native 500 on schema-constrained benches
      # (llama.cpp#24081). A small non-zero temp avoids it at negligible quality cost.
      no_think:
         temperature: 0.3
         top_p: 0.95

   # ── LFM2.5 (always-reasoning, null think state) ────────────────────────────
   # Reasoning trace extracted server-side via --reasoning-format auto.
   lfm2.5:
      default:
         temperature: 0.2
         top_k: 80
         repeat_penalty: 1.05

   # ── GLM-4.x (Flash + 4.1V): chat-template thinking; standard sampling. ──────
   glm:
      default:
         temperature: 0.6
         top_p: 0.95
         top_k: 40
      think:
         temperature: 0.6
         top_p: 0.95

   # ── Granite 4.0 (IBM recommends near-greedy for instruction following) ──────
   granite:
      default:
         temperature: 0.0
         top_p: 1.0

   # ── Nemotron 3 Nano (mamba-hybrid; no_schema set, but keep temp>0 defensively)
   nemotron3:
      think:
         temperature: 0.6
         top_p: 0.95
      no_think:
         temperature: 0.3
         top_p: 0.95


# ── Host configuration ───────────────────────────────────────────────────────────
# Defined separately in config/hosts.yaml.
# Models run on: rose (llm2) — RX 7900 XT 20 GiB
