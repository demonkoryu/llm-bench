   # Ships a new chat template baked into the GGUF (used automatically as 'builtin').
   # No MTP draft available for this model. kv_variants q4_0 → q5_0 progressive sweep.
   - hf_repo: google/gemma-4-31B-it-qat-q4_0-gguf
     hf_file: gemma-4-31B_q4_0-it.gguf
     label: "Gemma4-31B QAT q4_0"
     family: gemma4
     type: dense
     think: optional
     think_control: enable_thinking
     tools: true
     native_max_ctx: 131072
     ctx_cap: 102400   # gemma4 family coheres to ~100k, not the full 131072 (agent_ctx planner @128k was incoherent + near-OOM 2026-07-18)
     kv_bytes_per_token: 16384
     extra_flags: { "no-mmproj": true }   # repo ships gemma-4-31B-it-mmproj.gguf — skip it (text-only)
     benches: [triage, reasoning, toolcalling, summarization, docqa, coding_hard, coding_practical, coding_bugfix, speed, agent_ctx, fit_ctx]
     kv_variants: [q4_0, q5_0]

   # ── Gemma4 QAT — Unsloth Dynamic UD-Q4_K_XL (QAT base, unsloth's dynamic quant) ─
   # Unsloth's quantization-aware-trained GGUFs: same QAT recipe as Google's q4_0
   # but repacked as the UD-Q4_K_XL dynamic mix (per-tensor bit allocation) for
   # better accuracy at similar size. Hybrids (think: optional) → run no-think-only
   # via --skip-think, like the rest of the run series. Both repos ship mmproj
   # vision towers → no-mmproj.
   - hf_repo: unsloth/gemma-4-12B-it-qat-GGUF
     hf_file: gemma-4-12B-it-qat-UD-Q4_K_XL.gguf
     label: "Gemma4-12B QAT UD-Q4_K_XL"
     disabled: true   # parked 2026-06-08 (non-KV; KV-sweep focus)
     family: gemma4
     type: dense
     think: optional
     think_control: enable_thinking
     tools: true
     native_max_ctx: 131072   # same 128k window as the other 12B GGUFs
     kv_bytes_per_token: 16384
     extra_flags: { "no-mmproj": true }   # skip gemma4 vision projector (text-only)
     benches: [triage, reasoning, toolcalling, summarization, docqa, coding_hard, coding_practical, coding_bugfix, speed, agent_ctx, fit_ctx]

   - hf_repo: unsloth/gemma-4-26B-A4B-it-qat-GGUF
     hf_file: gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
     label: "Gemma4-26B QAT UD-Q4_K_XL"
     family: gemma4
     type: moe
     think: optional
     think_control: enable_thinking
     tools: true
     native_max_ctx: 131072
     kv_bytes_per_token: 16384
     extra_flags:
        "no-mmproj": true   # repo ships mmproj-*.gguf — skip it (text-only)
        model-draft: /home/demonkoryu/models/gemma-4-26B-A4B-it-MTP-Q8_0.gguf
        spec-type: draft-mtp
        spec-draft-n-max: 4
     benches: [triage, reasoning, toolcalling, summarization, docqa, coding_hard, coding_practical, coding_bugfix, speed, agent_ctx, fit_ctx]
     kv_variants: [q4_0, q5_0]   # q4_0 added 2026-07-20 to align agent_ctx/VRAM with the q4_0 quality rows

   # ── LFM2.5-8B-A1B ────────────────────────────────────────────────────────────
   # Always-reasoning: outputs to reasoning_content field, not content.
   # Only 6 of 24 layers are attention → tiny KV footprint.
   - hf_repo: LiquidAI/LFM2.5-8B-A1B-GGUF
     hf_file: LFM2.5-8B-A1B-Q5_K_M.gguf
     label: "LFM2.5-8B Q5_K_M"
     disabled: true   # parked 2026-06-07 (user prune)
     family: lfm2.5
     type: dense
     think: reasoning
     tools: true   # native tool-calling; emits Pythonic calls by default (may grade low vs JSON grader)
     native_max_ctx: 131072
     ctx_cap: 131072
     kv_bytes_per_token: 8192
     # NO triage: always-reasoning model spends the smoke triage-JSON probe's token
     # budget on reasoning_content before emitting proposed_action → smoke FAILs
     # (triage-json:no-action) → ALL benches skip. Capability limit, like Nemotron+tools.
     benches: [reasoning, toolcalling, summarization, docqa, coding_hard, coding_practical, coding_bugfix, speed, agent_ctx, fit_ctx]
     capability_note: "triage excluded: always-reasoning output can't emit triage-JSON action within the smoke probe budget"
     notes: "reasoning_content merged by llm client. repeat_penalty in sampling_matrix."

   # ── Granite-4.0-H-Tiny (MoE 7B-A1B, mamba-hybrid) ─────────────────────────────
   # IBM: strong function-calling; no native think toggle. ≈5GB → big KV headroom.
   - hf_repo: unsloth/granite-4.0-h-tiny-GGUF
     hf_file: granite-4.0-h-tiny-Q5_K_M.gguf
     label: "Granite-4-H-Tiny Q5_K_M"
     disabled: true   # parked 2026-06-07 (user prune)
     family: granite
     type: moe
     arch: mamba-hybrid          # 7B-A1B MoE with mamba layers (name carries no <n>B token)
     total_params: 7
     active_params: 1
     think: none
     tools: true
     native_max_ctx: 131072
     kv_bytes_per_token: 8192
     benches: [triage, reasoning, toolcalling, summarization, docqa, coding_hard, coding_practical, coding_bugfix, speed, agent_ctx, fit_ctx]

   # ── Nemotron-3-Nano-4B (mamba-hybrid) ─────────────────────────────────────────
   # Small v3 Nemotron; Q8_0 ≈4.3GB → big KV headroom for long context. Same bug
   # class as the family: no_schema set; tool-calling blocked (llama.cpp#24081);
   # mamba-base.cpp assert (#20570) may crash on load.
   - hf_repo: bartowski/nvidia_Nemotron-3-Nano-4B-GGUF
     hf_file: nvidia_Nemotron-3-Nano-4B-Q8_0.gguf
     label: "Nemotron-3-Nano-4B Q8_0"
     disabled: true   # parked 2026-06-07 (user prune)
     family: nemotron3
     type: dense
     think: optional
     think_control: system_keyword
     tools: false
     capability_note: "tool-calling + json_schema blocked by llama.cpp#24081 class; mamba assert risk #20570"
     no_schema: true
     native_max_ctx: 131072
     kv_bytes_per_token: 16384
     benches: [triage, reasoning, summarization, docqa, coding_hard, coding_practical, coding_bugfix, speed, agent_ctx, fit_ctx]


# ── Sampling matrix ───────────────────────────────────────────────────────────────
# Read by shared/llm/sampling.mjs. Authoritative source for ALL per-request sampling.
# Keyed by model family (matches the `family:` field above).
#
# Structure per family:
#   default:   shared base params applied to all passes (non-thinking models use this alone)
#   think:     delta merged on top of default for think=true passes
#   no_think:  delta merged on top of default for think=false passes
#
# Use-case sub-keys (triage, reasoning, toolcalling, summarization, docqa, longctx, speed)
# override base params for that bench only. State block takes precedence over default.
#
# extra_flags in model entries above are server-launch flags ONLY (speculative decoding etc.).
# All sampling params belong here, including presence_penalty and repeat_penalty.
# There are no fallbacks — every family is explicitly tuned.
#
# Sources (verified from primary HuggingFace model cards, June 2026):
#   qwen3:       https://huggingface.co/Qwen/Qwen3-30B-A3B
#   qwen3-coder: https://huggingface.co/Qwen/Qwen3-Coder-30B-A3B-Instruct
#   qwen3.6:     https://huggingface.co/Qwen/Qwen3.6-35B-A3B
#   gemma4:      https://ai.google.dev/gemma/docs/core/model_card_4
#   lfm2.5:      https://huggingface.co/LiquidAI/LFM2.5-8B-A1B
#   nemotron:    https://huggingface.co/nvidia/NVIDIA-Nemotron-Nano-12B-v2

sampling_matrix:

   # ── Qwen3 (30B-2507 non-thinking; 14B hybrid) ─────────────────────────────
   # default = no_think base; think delta overrides temp/top_p only.
   # reasoning bench: even in no_think, use higher temp for chain-of-thought prompts.
   qwen3:
      default:
         temperature: 0.7
         top_p: 0.8
         top_k: 20
         min_p: 0
         reasoning:
            temperature: 0.6
            top_p: 0.95
         longctx:
            temperature: 0.1
            top_p: 0.9
         coding:
            temperature: 0.2
            top_p: 0.9
      think:
         temperature: 0.6
         top_p: 0.95

   # ── Qwen3.5 (9B hybrid GatedDeltaNet + sparse MoE) ─────────────────────────
   # Published params mirror Qwen3.6's shape: presence_penalty 1.5 shared; think
   # temp 1.0, no_think temp 0.7 (HF model card). Keep a low-temp coding override
   # as a guard against the Qwen reasoning-loop-on-coding failure mode (see qwen3.6).
   qwen3.5:
      default:
         top_k: 20
         min_p: 0
         presence_penalty: 1.5
         coding:
            temperature: 0.2
            top_p: 0.9
      think:
         temperature: 1.0
         top_p: 0.95
         docqa:
            temperature: 0.6
            top_p: 0.95
      no_think:
         temperature: 0.7
         top_p: 0.8

   # ── Qwen3.6 (35B-A3B MoE) ─────────────────────────────────────────────────
   # presence_penalty=1.5 shared; think uses temp=1.0, no_think uses temp=0.7.
   # docqa in think mode: lower temp for precise arithmetic.
   qwen3.6:
      default:
         top_k: 20
         min_p: 0
         presence_penalty: 1.5
         # DO NOT set presence_penalty 0.0 here. Qwen's published coding preset
         # (temp 0.6 / pp 0.0) is exactly the config that triggers Qwen3.6-A3B's
         # documented infinite-reasoning-loop bug on coding — the model repeats
         # phrases through the whole think budget and never emits code (QwenLM/
         # Qwen3.6 issues #88, #145; HF discussions #19/#20: 17.4% of outputs
         # truncated, 84% of those >30% repetition). Qwen's own mitigation is to
         # RAISE presence_penalty (0–2) to suppress the loop, plus an optional
         # reasoning-budget cap. We keep the shared pp 1.5 AND cap think at 12288
         # (MAX_TOKENS.coding_hard_think). Verified: pp 1.5 + temp 0.2 → 100% on
         # all coding passes; pp 0.0 (vendor preset) regressed think → RUNAWAY.
         coding:
            temperature: 0.2
            top_p: 0.9
      think:
         temperature: 1.0
         top_p: 0.95
         docqa:
            temperature: 0.6
            top_p: 0.95
      no_think:
         temperature: 0.7
         top_p: 0.8

   # ── Qwen3-Coder (30B-A3B — non-thinking) ──────────────────────────────────
   qwen3-coder:
      default:
         temperature: 0.7
         top_p: 0.8
         top_k: 20
         min_p: 0
         repeat_penalty: 1.05
         longctx:
            temperature: 0.1
            top_p: 0.9
         coding:
            temperature: 0.2
            top_p: 0.9

   # ── Gemma 4 (E4B and 26B-A4B) ─────────────────────────────────────────────
   # Google recommends identical params for all tasks and both think states:
   # temp 1.0 / top_p 0.95 / top_k 64. NB: Gemma is calibrated for temp≈1.0 — a
   # LOW-temp coding override (e.g. 0.2) starves it of entropy and causes
   # degenerate repetition/looping, which in think mode runs away to the token
   # ceiling (observed: gemma4-26B/12B coding_hard think → RUNAWAY at temp 0.2).
   # So NO coding override here — Gemma keeps its native temp 1.0, which the
   # community also finds codes best (some use up to 1.5). See model_card_4.
   gemma4:
      default:
         temperature: 1.0
         top_p: 0.95
         top_k: 64

   # ── Nemotron Nano 12B v2 ───────────────────────────────────────────────────
   # no_think = greedy (temp=0) per NVIDIA model card; think and no_think differ
   # entirely so no shared default base.
   nemotron:
      think:
         temperature: 0.6
         top_p: 0.95
      # NVIDIA recommends greedy (temp 0) for no_think, but temp 0 deterministically
      # triggers the llama.cpp peg-native 500 on schema-constrained benches
      # (llama.cpp#24081). A small non-zero temp avoids it at negligible quality cost.
      no_think:
         temperature: 0.3
         top_p: 0.95

   # ── LFM2.5 (always-reasoning, null think state) ────────────────────────────
   # Reasoning trace extracted server-side via --reasoning-format auto.
   lfm2.5:
      default:
         temperature: 0.2
         top_k: 80
         repeat_penalty: 1.05

   # ── Granite 4.0 (IBM recommends near-greedy for instruction following) ──────
   granite:
      default:
         temperature: 0.0
         top_p: 1.0

   # ── Nemotron 3 Nano (mamba-hybrid; no_schema set, but keep temp>0 defensively)
   nemotron3:
      think:
         temperature: 0.6
         top_p: 0.95
      no_think:
         temperature: 0.3
         top_p: 0.95


# ── Host configuration ───────────────────────────────────────────────────────────
# Defined separately in config/hosts.yaml.
# Models run on: rose (llm2) — RX 7900 XT 20 GiB
