# Model matrix for llm-bench.
#
# Fields per model:
#   hf_repo      HuggingFace repo (passed to llama-server --hf-repo)
#   hf_file      GGUF filename inside the repo (--hf-file)
#   label        Human-readable label for results tables
#   family       Model family (used for sampling defaults)
#   params       Approx active parameter count (B); for MoE = active experts
#   type         dense | moe
#   think        none | optional | required
#                  none     = no thinking mode (llama, gemma, etc.)
#                  optional = supports think:true/false (qwen3, deepseek-r1, etc.)
#                  required = always reasons
#   tools        true | false
#   vram_q4_gb   Approx VRAM at Q4 weight quant (weights only; add KV separately)
#   fit_rose     fits | spills | oom  (approximate, at 4k ctx + f16 KV)
#   benches      list of applicable benchmark suites
#                  triage | reasoning | toolcalling | toolcalling_decay | longctx | summarization | speed | maxctx
#   notes        any caveats
#
# KV quant variants (applied by the runner, llama.cpp only):
#   f16, q8_0, q4_0, k8v4  (k8v4 = q8_0/q4_0 asymmetric, ctk q8_0 / ctv q4_0)

models:

   # ── qwen3.5 family (0-hallucination triage club) ────────────────────────────

   - hf_repo: unsloth/Qwen3.5-4B-GGUF
     hf_file: Qwen3.5-4B-Q4_K_M.gguf
     label: "qwen3.5 4B Q4"
     family: qwen3.5
     params: 4
     type: dense
     think: optional
     tools: true
     vram_q4_gb: 5.9
     fit_rose: fits
     benches: [triage, reasoning, toolcalling, toolcalling_decay, summarization, speed, maxctx]

   - hf_repo: unsloth/Qwen3.5-4B-GGUF
     hf_file: Qwen3.5-4B-Q8_0.gguf
     label: "qwen3.5 4B Q8"
     family: qwen3.5
     params: 4
     type: dense
     think: optional
     tools: true
     vram_q4_gb: 8.0
     fit_rose: fits
     benches: [triage, speed, maxctx]

   - hf_repo: unsloth/Qwen3.5-9B-GGUF
     hf_file: Qwen3.5-9B-Q4_K_M.gguf
     label: "qwen3.5 9B Q4"
     family: qwen3.5
     params: 9
     type: dense
     think: optional
     tools: true
     vram_q4_gb: 8.7
     fit_rose: fits
     benches: [triage, reasoning, toolcalling, toolcalling_decay, summarization, speed, maxctx]

   - hf_repo: unsloth/Qwen3.5-9B-GGUF
     hf_file: Qwen3.5-9B-Q8_0.gguf
     label: "qwen3.5 9B Q8"
     family: qwen3.5
     params: 9
     type: dense
     think: optional
     tools: true
     vram_q4_gb: 13.0
     fit_rose: fits
     benches: [triage, speed, maxctx]

   - hf_repo: unsloth/Qwen3.5-27B-GGUF
     hf_file: Qwen3.5-27B-Q4_K_M.gguf
     label: "qwen3.5 27B Q4"
     family: qwen3.5
     params: 27
     type: dense
     think: optional
     tools: true
     vram_q4_gb: 22.0
     fit_rose: spills      # ~22 GB → partial CPU offload
     benches: [triage, speed, maxctx]
     notes: "Spills VRAM (~22 GB); ~15 tok/s. q4_0 KV crashed at VRAM edge — do not use."

   # ── qwen3 family ────────────────────────────────────────────────────────────

   - hf_repo: unsloth/Qwen3-4B-GGUF
     hf_file: Qwen3-4B-Q4_K_M.gguf
