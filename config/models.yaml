# Model matrix for llm-bench.
#
# Fields per model:
#   hf_repo          HuggingFace repo (passed to llama-server --hf-repo)
#   hf_file          GGUF filename inside the repo (--hf-file)
#   label            Human-readable label for results tables
#   family           Model family — must match a key in sampling_matrix
#   type             dense | moe
#   think            none | optional | required | reasoning
#                      none       = no thinking mode
#                      optional   = supports think:true/false (Qwen3, Qwen3.6, Gemma4, Nemotron)
#                      required   = always outputs think tags (DeepSeek-R1 distill)
#                      reasoning  = always reasons in reasoning_content field (LFM2.5)
#   think_control    enable_thinking (default) | system_keyword
#                      enable_thinking  = chat_template_kwargs.enable_thinking
#                      system_keyword   = /think or /no_think prepended to system message
#   tools            true | false
#   native_max_ctx   Documented maximum context window (tokens). Caps the binary search.
#   ctx_cap          Hard override cap (OOM/RoPE ceiling discovered empirically)
#   kv_bytes_per_token  Q8_0 KV cache bytes per input token (used to estimate hi bound)
#   extra_flags      Server-launch-only flags (speculative decoding, backend tweaks).
#                    NO sampling keys here — those belong exclusively in sampling_matrix.
#                    Batch sizing is NOT set per-entry: it comes from the top-level
#                    `defaults.extra_flags` block below (batch-size: 2048, ubatch-size:
#                    2048), merged into every model by shared/models-config.mjs with
#                    per-model keys overriding. So a model only lists extra_flags for
#                    what's UNIQUE to it (e.g. no-mmproj, spec-type); it inherits batch
#                    sizing automatically and can't silently regress to -ub 512.
#                    (Use the long-form keys — the flag builder prepends '--', and
#                    llama.cpp rejects --b / --ub; only -b/-ub or --batch-size/
#                    --ubatch-size are valid.) For a 30B MoE that OOMs at max ctx,
#                    override with `extra_flags: { ubatch-size: 1024 }`.
#   benches          Applicable benchmark suites:
#                      triage | reasoning | toolcalling | toolcalling_decay | longctx
#                      summarization | speed | agent_ctx | fit_ctx | docqa
#                      coding_hard | coding_practical | coding_bugfix
#   disabled         true → parked: stays in this file but filtered out by
#                      shared/models-config.mjs loadModelsConfig() (runners never see
#                      it). Omit (or false) = active. Reversible: delete the line.
#   kv_variants      Optional [quant, ...] list — expand this model into one ranked
#                      configuration per KV-cache quant (cache-type-k/v). Set per-model
#                      ONLY where the quant actually moves the needle (the big-KV models:
#                      35B + 26B). A model without it stays a single plain row — exactly
#                      like a non-hybrid has no think split. Each variant gets a
#                      `--kv<quant>` id tag + " · KV <quant>" label so it ranks separately
#                      in the dashboard. Symmetric quants only.
#   notes            Caveats

# Global defaults merged into every model's extra_flags (per-model keys override).
# Lives here so batch sizing is uniform fleet-wide and a newly-added model can't
# silently regress to llama.cpp's default -ub 512. Merge is done by
# shared/models-config.mjs → loadModelsConfig(); raw `yaml.load()` does NOT apply it.
defaults:
   extra_flags:
      batch-size: 2048
      ubatch-size: 2048
   # KV-cache quant sweep is NOT fleet-wide: quant only pays off where the KV cache is
   # large (the 35B + 26B models — ~half KV VRAM, +15–26% decode at depth). It's set
   # per-model via `kv_variants: [q4_0, q5_0, q5_1, q8_0]` on those four entries only; the small
   # models (9B/12B/14B) stay a single plain q8_0 row, mirroring how a non-hybrid model
   # has no think split. shared/models-config.mjs injects --cache-type-k/v + a
   # `--kv<quant>` id tag per variant. Symmetric only — asymmetric K/V de-fuses the FA
   # kernel. To sweep a model, add kv_variants to it; to stop, remove the line.

