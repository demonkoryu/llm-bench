# Model matrix for llm-bench.
#
# Fields per model:
#   tag          Ollama model tag
#   label        Human-readable label for results tables
#   family       Model family (used for sampling defaults)
#   params       Approx active parameter count (B); for MoE = active experts
#   type         dense | moe
#   think        none | optional | required
#                  none     = no thinking mode (llama, gemma, etc.)
#                  optional = supports think:true/false (qwen3, deepseek-r1, etc.)
#                  required = always reasons (gpt-oss, DeepSeek-R1-0528)
#   tools        true | false — supports Ollama tools API
#   vram_q4_gb   Approx VRAM at Q4 weight quant (weights only; add KV separately)
#   fit_rose     fits | spills | oom  (approximate, at 4k ctx + f16 KV)
#   benches      list of applicable benchmark suites
#                  triage | reasoning | toolcalling | toolcalling_decay | longctx | summarization | speed | maxctx
#   weight_quants list of weight quants to test (f16 = native Ollama default unless tagged)
#   notes        any caveats
#
# KV quant variants (applied by the runner against each model):
#   Ollama:    f16, q8_0, q4_0  (symmetric only; set via OLLAMA_KV_CACHE_TYPE)
#   llama.cpp: f16, q8_0, q4_0, k8v4  (k8v4 = q8_0/q4_0 asymmetric, llama.cpp only)

models:

   # ── qwen3.5 family (0-hallucination triage club) ────────────────────────────

   - tag: qwen3.5:4b
     label: "qwen3.5 4B"
     family: qwen3.5
     params: 4
     type: dense
     think: optional
     tools: true
     vram_q4_gb: 5.9
     fit_rose: fits
     benches: [triage, reasoning, toolcalling, toolcalling_decay, summarization, speed, maxctx]
     weight_quants: [f16]

   - tag: qwen3.5:4b-q8_0
     label: "qwen3.5 4B Q8"
     family: qwen3.5
     params: 4
     type: dense
     think: optional
     tools: true
     vram_q4_gb: 8.0
     fit_rose: fits
     benches: [triage, speed, maxctx]
     weight_quants: [q8_0]

   - tag: qwen3.5:9b
     label: "qwen3.5 9B"
     family: qwen3.5
     params: 9
     type: dense
     think: optional
     tools: true
     vram_q4_gb: 8.7
     fit_rose: fits
     benches: [triage, reasoning, toolcalling, toolcalling_decay, summarization, speed, maxctx]
     weight_quants: [f16]

   - tag: qwen3.5:9b-q8_0
     label: "qwen3.5 9B Q8"
     family: qwen3.5
     params: 9
     type: dense
     think: optional
     tools: true
     vram_q4_gb: 13.0
     fit_rose: fits
     benches: [triage, speed, maxctx]
     weight_quants: [q8_0]

   - tag: qwen3.5:27b
     label: "qwen3.5 27B"
     family: qwen3.5
     params: 27
     type: dense
     think: optional
     tools: true
     vram_q4_gb: 22.0
     fit_rose: spills      # ~22 GB → partial CPU offload
     benches: [triage, speed, maxctx]
     weight_quants: [f16]
     notes: "Spills VRAM (~22 GB); ~15 tok/s. q4_0 KV crashed at VRAM edge — do not use."

   # ── qwen3 family ────────────────────────────────────────────────────────────

   - tag: qwen3:4b
     label: "qwen3 4B"
     family: qwen3
     params: 4
     type: dense
     think: optional
     tools: true
     vram_q4_gb: 3.5
     fit_rose: fits
     benches: [triage, reasoning, toolcalling, speed, maxctx]
     weight_quants: [f16]

   - tag: qwen3:30b-a3b
     label: "qwen3 30B-A3B (MoE)"
     family: qwen3
     params: 3   # active
     type: moe
     think: optional
     tools: true
     vram_q4_gb: 18.0
     fit_rose: fits
     benches: [triage, reasoning, toolcalling, speed, maxctx]
     weight_quants: [f16]

   # ── qwen2.5 family ──────────────────────────────────────────────────────────

   - tag: qwen2.5:7b
     label: "qwen2.5 7B"
     family: qwen2.5
     params: 7
     type: dense
     think: none
     tools: true
     vram_q4_gb: 4.9
     fit_rose: fits
     benches: [triage, toolcalling, summarization, speed, maxctx]
     weight_quants: [f16]

   - tag: qwen2.5:14b
     label: "qwen2.5 14B"
     family: qwen2.5
     params: 14
     type: dense
     think: none
     tools: true
     vram_q4_gb: 9.7
     fit_rose: fits
     benches: [triage, toolcalling, summarization, speed, maxctx]
     weight_quants: [f16]

   # ── DeepSeek family ─────────────────────────────────────────────────────────

   - tag: "hf.co/unsloth/DeepSeek-R1-0528-Qwen3-8B-GGUF:Q4_K_XL"
     label: "DeepSeek-R1-0528 8B"
     family: deepseek-r1
     params: 8
     type: dense
     think: required
     tools: true
     vram_q4_gb: 5.9
     fit_rose: fits
     benches: [triage, reasoning, summarization, speed, maxctx]
     weight_quants: [f16]

   - tag: deepseek-r1:14b
     label: "deepseek-r1 14B"
     family: deepseek-r1
     params: 14
     type: dense
     think: optional
     tools: false    # Ollama refuses — no tool support in template
     vram_q4_gb: 9.7
     fit_rose: fits
     benches: [reasoning, speed, maxctx]
     weight_quants: [f16]
     notes: "Ollama rejects tool calls for this template. Reasoning specialist only."

   # ── Other providers ─────────────────────────────────────────────────────────

   - tag: gpt-oss:20b
     label: "gpt-oss 20B (MXFP4)"
     family: gpt-oss
     params: 20
     type: dense
     think: required   # always reasons internally
     tools: true
     vram_q4_gb: 14.0
     fit_rose: fits
     benches: [triage, reasoning, toolcalling, summarization, speed, maxctx]
     weight_quants: [f16]

   - tag: mistral-small:24b
     label: "mistral-small 24B"
     family: mistral
     params: 24
     type: dense
     think: none
     tools: true
     vram_q4_gb: 14.0
     fit_rose: fits
     benches: [triage, toolcalling, toolcalling_decay, summarization, speed, maxctx]
     weight_quants: [f16]

   - tag: phi4:14b
     label: "phi4 14B"
     family: phi4
     params: 14
     type: dense
     think: none
     tools: false
     vram_q4_gb: 10.0
     fit_rose: fits
     benches: [triage, summarization, speed, maxctx]
     weight_quants: [f16]

   - tag: granite3.3:8b
     label: "granite3.3 8B"
     family: granite
     params: 8
     type: dense
     think: none
     tools: false
     vram_q4_gb: 6.1
     fit_rose: fits
     benches: [triage, summarization, speed, maxctx]
     weight_quants: [f16]

   - tag: llama3.1:8b
     label: "llama3.1 8B"
     family: llama
     params: 8
     type: dense
     think: none
     tools: true
     vram_q4_gb: 5.5
     fit_rose: fits
     benches: [triage, toolcalling, longctx, summarization, speed, maxctx]
     weight_quants: [f16]
     notes: "Primary llama.cpp long-context reference model (used in KV sweep)."

   - tag: gemma4:26b
     label: "gemma4 26B"
     family: gemma4
     params: 26
     type: dense
     think: none
     tools: false
     vram_q4_gb: 19.0
     fit_rose: spills   # borderline; sliding-window helps at long ctx
     benches: [triage, speed, maxctx]
     weight_quants: [f16]
     notes: "Borderline 19 GB; sliding-window attention reduces KV cost at long context."

   # ── NEW: Qwen3.6 35B MoE ────────────────────────────────────────────────────

   - tag: "qwen3.6:35b-a3b"     # VERIFY: confirm exact Ollama tag before first run
     label: "Qwen3.6 35B MoE (Q4)"
     family: qwen3.6
     params: 3   # active (a3b); ~3B active out of 35B total
     type: moe
     think: optional
     tools: true
     vram_q4_gb: 21.0   # Q4 weights ~21 GB → partial CPU offload on 20 GiB card
     fit_rose: spills    # spills by ~1-2 GB; MoE keeps it usable (only 3B active)
     benches: [triage, reasoning, toolcalling, speed, maxctx]
     weight_quants: [f16]
     notes: >
        TAG UNVERIFIED — confirm `ollama show qwen3.6:35b-a3b` on rose before running.
        Q4 only; no Q8 (too large). Weights spill ~1-2 GB to CPU but MoE active count
        keeps decode fast (~30-45 tok/s est.). Primary result is maxctx binary search.
        Qwen3.6 was released 2026-06 — may require Ollama >= 0.25.


# ── Sampling profiles per family ────────────────────────────────────────────────
# Used by the runner to build per-request options. think_mode overrides are per-bench.

sampling:
   qwen3.5_nothink:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      presence_penalty: 1.5

   qwen3.5_think:
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      presence_penalty: 0.0

   deepseek_r1:
      temperature: 0.6
      top_p: 0.95
      min_p: 0.05

   deepseek_r1_0528:
      temperature: 0.6
      top_p: 0.95
      min_p: 0.01

   gpt_oss:
      temperature: 0.6

   default:
      temperature: 0.1

   reasoning:   # all models, reasoning bench only
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      num_ctx: 8192

   toolcalling:  # all models, toolcalling bench only
      temperature: 0.4
      top_p: 0.9
      num_ctx: 8192


# ── KV quant configs ────────────────────────────────────────────────────────────

kv_configs:
   ollama:     [f16, q8_0, q4_0]
   llamacpp:   [f16, q8_0, q4_0, k8v4]   # k8v4 = q8_0/q4_0 asymmetric

# Context probe points for speed + maxctx bench
ctx_probe_points: [4096, 16384, 32768, 65536]
