   - hf_repo: mradermacher/gemma-4-26B-A4B-GGUF
     hf_file: gemma-4-26B-A4B.Q4_K_M.gguf
     label: "gemma4 26B A4B MoE Q4"
     family: gemma4
     params: 4   # active; 4B active out of 26B total
     type: moe
     think: none
     tools: false
     vram_q4_gb: 16.9
     fit_rose: fits
     benches: [triage, speed, maxctx]
     notes: "MoE (4B active). 16.9 GB Q4_K_M fits on 20 GiB. Sliding-window attention helps at long ctx."

   # ── Qwen3.6 35B MoE ─────────────────────────────────────────────────────────

   - hf_repo: unsloth/Qwen3.6-35B-A3B-GGUF
     hf_file: UD-Q4_K_S/Qwen3.6-35B-A3B-UD-Q4_K_S.gguf
     label: "Qwen3.6 35B MoE UD-Q4_K_S"
     family: qwen3.6
     params: 3   # active; 3B active out of 35B total
     type: moe
     think: optional
     tools: true
     vram_q4_gb: 20.9
     fit_rose: spills    # 20.9 GB → minimal spill; MoE active-param count keeps tok/s viable
     benches: [triage, reasoning, toolcalling, speed, maxctx]
     notes: "UD-Q4_K_S = 20.9 GB; minimal spill on 20 GiB card. Q4_K_M (22.1 GB) skipped — too much spill."


# ── Sampling profiles per family ────────────────────────────────────────────────
sampling:
   qwen3.5_nothink:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      presence_penalty: 1.5

   qwen3.5_think:
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      presence_penalty: 0.0

   deepseek_r1:
      temperature: 0.6
      top_p: 0.95
      min_p: 0.05

   deepseek_r1_0528:
      temperature: 0.6
      top_p: 0.95
      min_p: 0.01

   default:
      temperature: 0.1

   reasoning:   # all models, reasoning bench only
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      num_ctx: 8192

   toolcalling:  # all models, toolcalling bench only
      temperature: 0.4
      top_p: 0.9
      num_ctx: 8192


# ── KV quant configs ────────────────────────────────────────────────────────────
kv_configs:
   llamacpp: [f16, q8_0, q4_0, k8v4]   # k8v4 = ctk q8_0 / ctv q4_0 asymmetric

# Context probe points for speed + maxctx bench
ctx_probe_points: [4096, 16384, 32768, 65536]
