   # ── Other models ─────────────────────────────────────────────────────────────

   - hf_repo: unsloth/Mistral-Small-24B-Instruct-2501-GGUF
     hf_file: Mistral-Small-24B-Instruct-2501-Q4_K_M.gguf
     label: "mistral-small 24B Q4"
     family: mistral
