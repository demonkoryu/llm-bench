# Model matrix for llm-bench.
#
# Fields per model:
#   hf_repo          HuggingFace repo (passed to llama-server --hf-repo)
#   hf_file          GGUF filename inside the repo (--hf-file)
#   label            Human-readable label for results tables
#   family           Model family — must match a key in sampling_matrix
#   type             dense | moe
#   think            none | optional | required | reasoning
#                      none       = no thinking mode
#                      optional   = supports think:true/false (Qwen3, Qwen3.6, Gemma4, Nemotron)
#                      required   = always outputs think tags (DeepSeek-R1 distill)
#                      reasoning  = always reasons in reasoning_content field (LFM2.5)
#   think_control    enable_thinking (default) | system_keyword
#                      enable_thinking  = chat_template_kwargs.enable_thinking
#                      system_keyword   = /think or /no_think prepended to system message
#   tools            true | false
#   native_max_ctx   Documented maximum context window (tokens). Caps the binary search.
#   ctx_cap          Hard override cap (OOM/RoPE ceiling discovered empirically)
#   kv_bytes_per_token  Q8_0 KV cache bytes per input token (used to estimate hi bound)
#   extra_flags      Server-launch-only flags (speculative decoding, backend tweaks).
#                    NO sampling keys here — those belong exclusively in sampling_matrix.
#   benches          Applicable benchmark suites:
#                      triage | reasoning | toolcalling | toolcalling_decay | longctx
#                      summarization | speed | maxctx | docqa
#   notes            Caveats

models:

   # ── Qwen3-Coder 30B ──────────────────────────────────────────────────────────
   # NO thinking mode (model never generates <think> blocks).
   # Native ctx: 262,144 tokens with YaRN (per HF model card).
   - hf_repo: unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF
     hf_file: Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf
     label: "Qwen3-Coder-30B Q4_K_XL"
     family: qwen3-coder
     type: moe
     think: none
     tools: true
     native_max_ctx: 262144
     kv_bytes_per_token: 49152
     extra_flags: {}
     benches: [triage, toolcalling, summarization, docqa, speed, maxctx]
     notes: "No think mode. repeat_penalty in sampling_matrix."

   # ── Qwen3-30B-A3B-Instruct-2507 ──────────────────────────────────────────────
   # Non-thinking only: 2507-Instruct never emits <think> blocks.
   # Native ctx: 262,144 tokens (per HF model card).
   - hf_repo: unsloth/Qwen3-30B-A3B-Instruct-2507-GGUF
     hf_file: Qwen3-30B-A3B-Instruct-2507-UD-Q4_K_XL.gguf
     label: "Qwen3-30B-2507 Q4_K_XL"
     family: qwen3
     type: moe
     think: none
     tools: true
     native_max_ctx: 262144
     kv_bytes_per_token: 49152
     extra_flags: {}
     benches: [triage, reasoning, toolcalling, summarization, docqa, speed, maxctx]

   - hf_repo: unsloth/Qwen3-30B-A3B-Instruct-2507-GGUF
     hf_file: Qwen3-30B-A3B-Instruct-2507-IQ4_XS.gguf
     label: "Qwen3-30B-2507 IQ4_XS"
     family: qwen3
     type: moe
     think: none
     tools: true
     native_max_ctx: 262144
     ctx_cap: 81920
     kv_bytes_per_token: 49152
     extra_flags: {}
     benches: [triage, reasoning, toolcalling, summarization, docqa, speed, maxctx]

   # ── Qwen3-14B Q5_K_M ────────────────────────────────────────────────────────
   # Hybrid: runs both nothi and think passes.
   # Native ctx: 32,768 tokens; 131,072 with YaRN.
   - hf_repo: unsloth/Qwen3-14B-GGUF
     hf_file: Qwen3-14B-Q5_K_M.gguf
     label: "Qwen3-14B Q5_K_M"
     family: qwen3
     type: dense
     think: optional
     tools: true
     native_max_ctx: 32768
     ctx_cap: 40960
     kv_bytes_per_token: 24576
     extra_flags: {}
     benches: [triage, reasoning, toolcalling, toolcalling_decay, summarization, docqa, speed, maxctx]

   # ── Qwen3.6-35B-A3B IQ4_XS ──────────────────────────────────────────────────
   # Hybrid: runs both nothi and think passes.
   # Native ctx: 262,144 tokens (genuine, not YaRN-extended).
   # MTP repo includes the speculative-draft head required for --spec-type draft-mtp.
   - hf_repo: unsloth/Qwen3.6-35B-A3B-MTP-GGUF
     hf_file: Qwen3.6-35B-A3B-UD-IQ4_XS.gguf
     label: "Qwen3.6-35B IQ4_XS"
     family: qwen3.6
     type: moe
     think: optional
     tools: true
     native_max_ctx: 262144
     kv_bytes_per_token: 49152
     extra_flags:
        spec-type: draft-mtp
        spec-draft-n-max: 4
     benches: [triage, reasoning, toolcalling, summarization, docqa, speed, maxctx]
     notes: "MTP speculative draft; smoke will catch if Vulkan build lacks support."

   # ── Gemma4-E4B ───────────────────────────────────────────────────────────────
   # Hybrid: runs both nothi and think passes.
   # Google unified sampling: same params for ALL tasks and both think states.
   # Reasoning trace format: <|channel>thought … <channel|>  (NOT <think> tags).
   - hf_repo: unsloth/gemma-4-E4B-it-GGUF
     hf_file: gemma-4-E4B-it-Q8_0.gguf
     label: "Gemma4-E4B Q8_0"
     family: gemma4
     type: moe
     think: optional
     think_control: enable_thinking
     tools: false
     native_max_ctx: 128000
     kv_bytes_per_token: 16384
     extra_flags: {}
     benches: [triage, reasoning, summarization, docqa, speed, maxctx]

   - hf_repo: unsloth/gemma-4-E4B-it-GGUF
     hf_file: gemma-4-E4B-it-Q5_K_M.gguf
     label: "Gemma4-E4B Q5_K_M"
     family: gemma4
     type: moe
     think: optional
     think_control: enable_thinking
     tools: false
     native_max_ctx: 128000
     kv_bytes_per_token: 16384
     extra_flags: {}
     benches: [triage, reasoning, summarization, docqa, speed, maxctx]

   # ── Gemma4-26B-A4B ───────────────────────────────────────────────────────────
   # Hybrid: runs both nothi and think passes. ~16.9 GB weights.
   # Same sampling + think mechanism as E4B; same channel-format reasoning trace.
   - hf_repo: unsloth/gemma-4-26B-A4B-it-GGUF
     hf_file: gemma-4-26B-A4B-it-UD-Q4_K_M.gguf
     label: "Gemma4-26B Q4_K_M"
     family: gemma4
     type: moe
     think: optional
     think_control: enable_thinking
     tools: false
     native_max_ctx: 128000
     kv_bytes_per_token: 16384
     extra_flags: {}
     benches: [triage, reasoning, summarization, docqa, speed, maxctx]

   # ── Nemotron Nano 12B v2 ──────────────────────────────────────────────────────
   # Hybrid: runs both nothi and think passes.
   # Mamba-Transformer hybrid; think toggle via /think or /no_think system keywords.
   # no_think → greedy (temperature: 0) per NVIDIA model card.
   - hf_repo: bartowski/nvidia_NVIDIA-Nemotron-Nano-12B-v2-GGUF
     hf_file: nvidia_NVIDIA-Nemotron-Nano-12B-v2-Q4_K_M.gguf
     label: "Nemotron-12B Q4_K_M"
     family: nemotron
     type: dense
     think: optional
     think_control: system_keyword
     tools: false
     native_max_ctx: 128000
     kv_bytes_per_token: 16384
     extra_flags: {}
     benches: [triage, reasoning, summarization, docqa, speed, maxctx]

   - hf_repo: bartowski/nvidia_NVIDIA-Nemotron-Nano-12B-v2-GGUF
     hf_file: nvidia_NVIDIA-Nemotron-Nano-12B-v2-Q8_0.gguf
     label: "Nemotron-12B Q8_0"
     family: nemotron
     type: dense
     think: optional
     think_control: system_keyword
     tools: false
     native_max_ctx: 128000
     kv_bytes_per_token: 16384
     extra_flags: {}
     benches: [triage, reasoning, summarization, docqa, speed, maxctx]

   # ── LFM2.5-8B-A1B ────────────────────────────────────────────────────────────
   # Always-reasoning: outputs to reasoning_content field, not content.
   # Only 6 of 24 layers are attention → tiny KV footprint.
   - hf_repo: LiquidAI/LFM2.5-8B-A1B-GGUF
     hf_file: LFM2.5-8B-A1B-Q5_K_M.gguf
     label: "LFM2.5-8B Q5_K_M"
     family: lfm2.5
     type: dense
     think: reasoning
     tools: false
     native_max_ctx: 128000
     ctx_cap: 131072
     kv_bytes_per_token: 8192
     extra_flags: {}
     benches: [reasoning, summarization, docqa, speed, maxctx]
     notes: "reasoning_content merged by llm client. repeat_penalty in sampling_matrix."


# ── Sampling matrix ───────────────────────────────────────────────────────────────
# Read by shared/llm/sampling.mjs. Authoritative source for ALL per-request sampling.
# Keyed by model family (matches the `family:` field above).
#
# Think-state keys:
#   think    — enable_thinking: true  (or /think for system_keyword models)
#   no_think — enable_thinking: false (or /no_think)
#   default  — think toggle not sent (non-thinking or always-reasoning models)
#
# Use-case sub-keys override base params for that bench only.
#
# extra_flags in model entries above are server-launch flags ONLY (speculative decoding etc.).
# All sampling params belong here, including presence_penalty and repeat_penalty.
#
# Sources (verified from primary HuggingFace model cards, June 2026):
#   qwen3:       https://huggingface.co/Qwen/Qwen3-30B-A3B
#   qwen3-coder: https://huggingface.co/Qwen/Qwen3-Coder-30B-A3B-Instruct
#   qwen3.6:     https://huggingface.co/Qwen/Qwen3.6-35B-A3B
#   gemma4:      https://ai.google.dev/gemma/docs/core/model_card_4
#   lfm2.5:      https://huggingface.co/LiquidAI/LFM2.5-8B-A1B
#   nemotron:    https://huggingface.co/nvidia/NVIDIA-Nemotron-Nano-12B-v2

sampling_matrix:

   # ── Qwen3 (30B-2507, 14B — hybrid or non-thinking) ────────────────────────
   qwen3:
      think:
         temperature: 0.6
         top_p: 0.95
         top_k: 20
         min_p: 0
      no_think:
         temperature: 0.7
         top_p: 0.8
         top_k: 20
         min_p: 0
         toolcalling:
            temperature: 0.7
            top_p: 0.8
            top_k: 20
            min_p: 0
         reasoning:
            temperature: 0.6
            top_p: 0.95
            top_k: 20
            min_p: 0
         longctx:
            temperature: 0.1
            top_p: 0.9
            top_k: 20
            min_p: 0
      default:    # non-thinking models (think: none) use this key
         temperature: 0.7
         top_p: 0.8
         top_k: 20
         min_p: 0
         toolcalling:
            temperature: 0.7
            top_p: 0.8
            top_k: 20
            min_p: 0
         longctx:
            temperature: 0.1
            top_p: 0.9
            top_k: 20
            min_p: 0

   # ── Qwen3.6 (35B-A3B MoE — different from Qwen3) ──────────────────────────
   # think mode uses temp=1.0 (not 0.6); presence_penalty=1.5 both modes
   qwen3.6:
      think:
         temperature: 1.0
         top_p: 0.95
         top_k: 20
         min_p: 0
         presence_penalty: 1.5
         docqa:
            temperature: 0.6
            top_p: 0.95
            top_k: 20
            min_p: 0
            presence_penalty: 1.5
      no_think:
         temperature: 0.7
         top_p: 0.8
         top_k: 20
         min_p: 0
         presence_penalty: 1.5

   # ── Qwen3-Coder (30B-A3B — no think mode) ─────────────────────────────────
   qwen3-coder:
      default:
         temperature: 0.7
         top_p: 0.8
         top_k: 20
         min_p: 0
         repeat_penalty: 1.05
         longctx:
            temperature: 0.1
            top_p: 0.9

   # ── Gemma 4 (E4B and 26B-A4B — unified sampling across ALL tasks) ──────────
   # Google explicitly recommends the same params for all tasks and both think states.
   gemma4:
      default:
         temperature: 1.0
         top_p: 0.95
         top_k: 64

   # ── Nemotron Nano 12B v2 ────────────────────────────────────────────────────
   # no_think → greedy decoding per NVIDIA model card.
   nemotron:
      think:
         temperature: 0.6
         top_p: 0.95
      no_think:
         temperature: 0

   # ── LFM2.5 (always-reasoning via reasoning_content field) ──────────────────
   lfm2.5:
      default:
         temperature: 0.2
         top_k: 80
         repeat_penalty: 1.05


# ── Sampling fallbacks ────────────────────────────────────────────────────────────
# Used by shared/llm/sampling.mjs when a model's family is absent from sampling_matrix.
# Keyed by capability class: non_thinking | hybrid | thinking | reasoning_only
# Sourced from Qwen3 / DeepSeek-R1-0528 official guidance.

sampling_fallbacks:

   hybrid:
      think:
         temperature: 0.6
         top_p: 0.95
         top_k: 20
         min_p: 0
         reasoning:
            temperature: 0.6
            top_p: 0.95
            top_k: 20
            min_p: 0
         toolcalling:
            temperature: 0.4
            top_p: 0.9
            top_k: 20
            min_p: 0
      no_think:
         temperature: 0.7
         top_p: 0.8
         top_k: 20
         min_p: 0
         presence_penalty: 1.5
         reasoning:
            temperature: 0.6
            top_p: 0.95
            top_k: 20
            min_p: 0
         toolcalling:
            temperature: 0.4
            top_p: 0.9
            top_k: 20
            min_p: 0

   thinking:
      think:
         temperature: 0.6
         top_p: 0.95
         min_p: 0.05
         reasoning:
            temperature: 0.6
            top_p: 0.95
            min_p: 0.01

   reasoning_only:
      default:
         temperature: 0.2
         top_k: 80
         min_p: 0
         presence_penalty: 1.05

   non_thinking:
      default:
         temperature: 0.1
         toolcalling:
            temperature: 0.4
            top_p: 0.9
         summarization:
            temperature: 0.3


# ── Host configuration ───────────────────────────────────────────────────────────
# Defined separately in config/hosts.yaml.
# Models run on: rose (llm2) — RX 7900 XT 20 GiB
