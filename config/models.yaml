   - hf_repo: unsloth/Qwen3-30B-A3B-GGUF
     hf_file: Qwen3-30B-A3B-Q4_K_M.gguf
     label: "qwen3 30B-A3B (MoE) Q4"
     family: qwen3
     params: 3   # active
     type: moe
     think: optional
     tools: true
     vram_q4_gb: 18.0
     fit_rose: fits
     benches: [triage, reasoning, toolcalling, speed, maxctx]

   # ── qwen2.5 family ──────────────────────────────────────────────────────────

   - hf_repo: unsloth/Qwen2.5-7B-Instruct-GGUF
     hf_file: Qwen2.5-7B-Instruct-Q4_K_M.gguf
     label: "qwen2.5 7B Q4"
     family: qwen2.5
