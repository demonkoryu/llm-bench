<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>llm-bench dashboard</title>
<style>
:root{--bg:#0f0f13;--panel:#18181f;--text:#e0e0e0;--dim:#888;--accent:#c8b6ff;--good:#82dc82;--warn:#ffc850}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font:13px/1.4 'Segoe UI',Arial,sans-serif}
header{padding:12px 18px;border-bottom:1px solid #26262f}
h1{font-size:18px;margin:0 0 4px;color:var(--accent)}
#env{color:var(--dim);font-size:11px}
.warn{margin-top:6px;color:#1a1a1a;background:var(--warn);padding:4px 8px;border-radius:4px;display:inline-block}
main{display:flex;align-items:flex-start;gap:16px;padding:16px}
#controls{flex:0 0 290px;position:sticky;top:8px}
.ctl-head{display:flex;gap:8px;align-items:center;margin-bottom:6px}
button{background:#26262f;color:var(--text);border:1px solid #3a3a47;border-radius:4px;padding:3px 10px;cursor:pointer}
button:hover{border-color:var(--accent)}
.note{color:var(--dim);font-size:11px}
fieldset{border:1px solid #2a2a35;border-radius:6px;margin:8px 0;padding:6px 10px}
legend{color:var(--accent);font-size:11px;text-transform:capitalize}
.dial-row{display:grid;grid-template-columns:1fr 96px 40px;gap:6px;align-items:center;margin:3px 0;font-size:11px}
.dial-name{color:var(--dim);text-transform:capitalize}
input[type=range]{width:100%}
input[type=number]{width:96px;background:#0f0f13;color:var(--text);border:1px solid #3a3a47;border-radius:3px}
output{color:var(--accent);text-align:right;font-variant-numeric:tabular-nums}
#panels{flex:1;min-width:0;display:flex;flex-direction:column;gap:16px}
.panel{background:var(--panel);border:1px solid #26262f;border-radius:8px;padding:10px 14px;overflow-x:auto}
h2{font-size:14px;margin:0 0 8px;color:#a0a0c0}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{text-align:left;padding:3px 8px;border-bottom:1px solid #23232c;font-variant-numeric:tabular-nums;white-space:nowrap}
th{color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase}
code{color:#9fe7d6;font-size:11px}
.dim{color:var(--dim)} .warn-t{color:var(--warn)} .ok-t{color:var(--good)}
.stars{color:#ffd54a;letter-spacing:1px;white-space:nowrap}
tr.top5 td{background:rgba(255,213,74,0.06)}
</style></head><body>
<header><h1>llm-bench dashboard</h1><div id="env"></div><div id="banner"></div></header>
<main>
<aside id="controls"><div class="ctl-head"><strong>Dials</strong><button id="reset">reset</button><button id="csv">CSV</button></div>
<p class="note">Structure is fixed: <code>capability = coding × comprehension</code>; fleet = capability × speed_term. Dials only.</p>
<fieldset><legend>comprehension · contribution</legend><label class="dial-row"><span class="dial-name">comprehension strength</span>
     <input class="dial" type="range" id="d_comprehension_strength" min="0" max="2" step="0.05" value="1">
     <output id="d_comprehension_strength_out">1</output></label><label class="dial-row"><span class="dial-name">comprehension triage</span>
     <input class="dial" type="range" id="d_w_comprehension_triage" min="0" max="1" step="0.01" value="0.27">
     <output id="d_w_comprehension_triage_out">0.27</output></label><label class="dial-row"><span class="dial-name">comprehension summarization</span>
     <input class="dial" type="range" id="d_w_comprehension_summarization" min="0" max="1" step="0.01" value="0.22">
     <output id="d_w_comprehension_summarization_out">0.22</output></label><label class="dial-row"><span class="dial-name">comprehension docqa</span>
     <input class="dial" type="range" id="d_w_comprehension_docqa" min="0" max="1" step="0.01" value="0.2">
     <output id="d_w_comprehension_docqa_out">0.2</output></label><label class="dial-row"><span class="dial-name">comprehension reasoning</span>
     <input class="dial" type="range" id="d_w_comprehension_reasoning" min="0" max="1" step="0.01" value="0.31">
     <output id="d_w_comprehension_reasoning_out">0.31</output></label></fieldset><fieldset><legend>coding · contribution</legend><label class="dial-row"><span class="dial-name">coding strength</span>
     <input class="dial" type="range" id="d_coding_strength" min="0" max="2" step="0.05" value="1">
     <output id="d_coding_strength_out">1</output></label><label class="dial-row"><span class="dial-name">coding grade</span>
     <input class="dial" type="range" id="d_w_coding_grade" min="0" max="1" step="0.01" value="0.6">
     <output id="d_w_coding_grade_out">0.6</output></label><label class="dial-row"><span class="dial-name">coding agentic loop</span>
     <input class="dial" type="range" id="d_w_coding_agentic_loop" min="0" max="1" step="0.01" value="0.25">
     <output id="d_w_coding_agentic_loop_out">0.25</output></label><label class="dial-row"><span class="dial-name">coding instruction following</span>
     <input class="dial" type="range" id="d_w_coding_instruction_following" min="0" max="1" step="0.01" value="0.15">
     <output id="d_w_coding_instruction_following_out">0.15</output></label></fieldset><fieldset><legend>speed</legend><label class="dial-row"><span class="dial-name">speed e2e throughput</span>
     <input class="dial" type="range" id="d_w_speed_e2e_throughput" min="0" max="1" step="0.01" value="0.4">
     <output id="d_w_speed_e2e_throughput_out">0.4</output></label><label class="dial-row"><span class="dial-name">speed cold ttft</span>
     <input class="dial" type="range" id="d_w_speed_cold_ttft" min="0" max="1" step="0.01" value="0.45">
     <output id="d_w_speed_cold_ttft_out">0.45</output></label><label class="dial-row"><span class="dial-name">speed warm ttft</span>
     <input class="dial" type="range" id="d_w_speed_warm_ttft" min="0" max="1" step="0.01" value="0.15">
     <output id="d_w_speed_warm_ttft_out">0.15</output></label><label class="dial-row"><span class="dial-name">speed decode retention</span>
     <input class="dial" type="range" id="d_w_speed_decode_retention" min="0" max="1" step="0.01" value="0">
     <output id="d_w_speed_decode_retention_out">0</output></label></fieldset><fieldset><legend>fleet</legend><label class="dial-row"><span class="dial-name">worker ctx</span>
     <input class="dial" type="number" id="d_fleet_worker_ctx" value="65536" step="1024"></label><label class="dial-row"><span class="dial-name">parallel overhead</span>
     <input class="dial" type="number" id="d_fleet_parallel_overhead" value="512" step="64"></label><label class="dial-row"><span class="dial-name">reserve</span>
     <input class="dial" type="number" id="d_fleet_reserve" value="512" step="64"></label><label class="dial-row"><span class="dial-name">fleet w thru</span>
     <input class="dial" type="range" id="d_fleet_w_thru" min="0" max="1" step="0.01" value="0.5">
     <output id="d_fleet_w_thru_out">0.5</output></label><label class="dial-row"><span class="dial-name">fleet w lat</span>
     <input class="dial" type="range" id="d_fleet_w_lat" min="0" max="1" step="0.01" value="undefined">
     <output id="d_fleet_w_lat_out">undefined</output></label></fieldset>
</aside>
<section id="panels">
<div class="panel"><h2>Capability ranking</h2><div id="cap"></div></div>
<div class="panel"><h2>Fleet suitability</h2><div id="fleet"></div></div>
<div class="panel"><h2>Context size</h2><div id="ctx"></div></div>
<div class="panel"><h2>Per-model breakdown</h2><div id="breakdown"></div></div>
<div class="panel"><h2>Data sources / required runs</h2><div id="required"></div></div>
</section></main>
<script type="module">
/**
 * Pure scoring + grouping + fleet model for llm-bench.
 *
 * This module has NO node imports so it can run unchanged in the browser (the
 * dashboard inlines its source) AND in Node (build-report, render-chart, …). That
 * shared-code guarantee is what keeps the dashboard's live re-ranking from drifting
 * from the canonical report numbers.
 *
 * Three pure stages:
 *   computeMetrics(rows)        → canonical normalized table (raw + norm per metric)
 *   scoreGroups(models, dials)  → comprehension / coding / capability per model
 *   computeFleet(models, dials) → VRAM-packed fleet suitability per model
 *
 * Scoring STRUCTURE is fixed here (GROUPS); the dashboard only turns weight DIALS.
 *
 * Capability (the headline subranking) = coding × comprehension.
 *   • comprehension (additive) — document-comprehension axes: triage/categorization,
 *     summarization, docqa, reasoning.
 *   • coding (multiplicative composite) — the two hard gates toolcalling × struct_output
 *     × a renormalized competence bundle (coding grade, agentic loop, instruction
 *     following). A missing gate or missing coding grade zeroes coding (and thus the
 *     model), exactly as the old gate behavior — relocated into the coding group.
 *   • gate + amplifier are merged: both are just 0..1 multiplicative terms.
 * Speed is NOT part of capability — it feeds the fleet score (see computeFleet).
 * Context size (maxctx) is a standalone view, no longer a score amplifier.
 */

// RX 7900 XT usable VRAM (MiB). Mirrors config/hosts.yaml.
const CARD_TOTAL_MIB = 20464;

// ── Fixed group structure (membership + kind). Iterate on this in code, never the UI.
const GROUPS = {
   comprehension: {
      kind: 'additive',
      members: ['triage', 'summarization', 'docqa', 'reasoning'],
   },
   coding: {
      kind: 'multiplier-composite',
      gates: ['toolcalling', 'struct_output'],
      members: ['grade', 'agentic_loop', 'instruction_following'],
   },
   speed: {
      // Displayed/dialable speed score (additive). Capability ignores it; the fleet
      // score uses its own pargen-capacity + ttft-latency term (see computeFleet).
      kind: 'additive',
      members: ['e2e_throughput', 'cold_ttft', 'warm_ttft', 'decode_retention'],
   },
};

// Default dial values — reproduce a clean, documented baseline.
const DEFAULT_DIALS = {
   comprehension: {
      strength: 1, // exponent into capability (0 = neutralized, 1 = full)
      weights: { triage: 0.27, summarization: 0.22, docqa: 0.2, reasoning: 0.31 },
   },
   coding: {
      strength: 1,
      weights: { grade: 0.6, agentic_loop: 0.25, instruction_following: 0.15 },
   },
   speed: {
      weights: { e2e_throughput: 0.4, cold_ttft: 0.45, warm_ttft: 0.15, decode_retention: 0 },
   },
   fleet: {
      worker_ctx: 65536, // each worker slot's context window (sizes the slot packing)
      parallel_overhead: 512, // MiB extra for --parallel + unified KV
      reserve: 512, // MiB held back from the card
      ctx_tier: 100000, // main ctx is clamped to this tier (100k+ counts the same)
      w_cap: 2, // capability exponent — >1 makes high-capability dominate the ranking
      w_ctx: 1, // context-reach exponent (uses the clamped ctx_tier)
      w_slots: 1, // slot-count exponent — "several of them" parallel capacity
      w_thru: 0.5, // measured-throughput exponent (pargen aggregate); modulates without overtaking capability (w_cap=2)
   },
};

// Self-describing scoring shape for report.json + the chart subtitle.
const SCORING = {
   formula: 'capability = coding × comprehension   (fleet: see scoring.fleet)',
   groups: {
      comprehension: 'additive: triage, summarization, docqa, reasoning',
      coding: 'multiplicative: gate(toolcalling) × gate(struct_output) × bundle(grade, agentic_loop, instruction_following)',
      speed: 'additive (display): e2e_throughput, cold_ttft, warm_ttft, decode_retention',
   },
   fleet: 'fleet_suitability = capability^w_cap × ctx_norm^w_ctx × slots_norm^w_slots × throughput^w_thru (geometric blend; capability dominates, context/slots modulate; ctx clamped at ctx_tier)',
   default_dials: DEFAULT_DIALS,
};

// ── Identity ─────────────────────────────────────────────────────────────────

/** Lowercase, strip everything but [a-z0-9] so the slug can't introduce extra '-'. */
function slugify(s) {
   return String(s ?? '')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '');
}

/** Strip the hybrid think suffix to the canonical model id. */
function baseModel(m) {
   return String(m).replace(/--(?:nothi|think)$/, '');
}

// ── Shared (base-model-keyed) benches ────────────────────────────────────────────
const SHARED_BENCH_EXACT = new Set([
   'maxctx',
   'struct_output',
   'power_eff',
   'kv_per_tok',
   'judge',
   'instruction_following',
   'agentic_loop',
   'prefix_cache_cold_ms',
   'prefix_cache_warm_ms',
   'prefix_cache_speedup',
]);
const SHARED_BENCH_PREFIXES = ['speed_decay-', 'speed_pargen-', 'quality_decay-', 'ttft-', 'e2e-'];

/** True for a base-model-keyed bench (recorded once per base model). */
function isSharedBench(bench) {
   const b = String(bench);
   return SHARED_BENCH_EXACT.has(b) || SHARED_BENCH_PREFIXES.some((p) => b.startsWith(p));
}

// ── Deterministic merge across runs ──────────────────────────────────────────────
function statusRank(s) {
   return s === 'ok' ? 2 : s ? 1 : 0;
}

function supersedes(a, b) {
   const ra = statusRank(a.status);
   const rb = statusRank(b.status);
   if (ra !== rb) {
      return ra > rb;
   }
   const ta = a.ts ?? '';
   const tb = b.ts ?? '';
   if (ta !== tb) {
      return ta > tb;
   }
   return true;
}

/**
 * Dedup rows across runs by identity (model|think|bench): ok beats error, newest ts
 * wins. ORDER-INDEPENDENT. Returns a fresh array in first-seen key order.
 */
function mergeResultRows(rows) {
   const best = new Map();
   const order = [];
   for (const r of rows) {
      const key = `${r.model}|${r.think}|${r.bench}`;
      const prev = best.get(key);
      if (!prev) {
         best.set(key, r);
         order.push(key);
      } else if (supersedes(r, prev)) {
         best.set(key, r);
      }
   }
   return order.map((k) => best.get(k));
}

// ── Stage 1: computeMetrics — raw extraction + fleet-relative normalization ────────

/**
 * Turn raw per-bench rows into per-(model × think) summaries carrying every measured
 * field (raw) plus a fleet-normalized `norm` map (0..1) for each scorable metric.
 * Behavior of the extraction matches the historical aggregateModels; the `norm` map
 * and fleet memory inputs (kvPerTokMiB) are the additions that drive scoring/fleet.
 *
 * @returns {{ models, denom }} denom = { maxCtx, maxE2E, minTtft8k, minWarm, maxCoding }
 */
function computeMetrics(rows) {
   const data = mergeResultRows(rows).filter((r) => r.status === 'ok' && r.bench !== 'load' && r.bench !== 'smoke');

   const maxctxByModel = new Map();
   const maxctxVramByModel = new Map();
   const kvPerTokByModel = new Map(); // base model → KV MiB/token (kv_per_tok score is KiB/token)
   const decayByModel = new Map();
   const pargenByModel = new Map();
   const qualityByModel = new Map();
   const ttftByModel = new Map();
   const e2eByModel = new Map();
   const structByModel = new Map();
   const ifByModel = new Map();
   const agenticByModel = new Map();
   const agenticStepsByModel = new Map();
   const prefixCacheByModel = new Map();
   const powerEffByModel = new Map();
   const codingByMT = new Map();
   const setDepth = (map, base, key, val) => {
      if (!map.has(base)) map.set(base, new Map());
      map.get(base).set(key, val);
   };
   const depthOf = (bench, prefix) => Number(bench.replace(prefix, '').replace('k', '')) * 1024;
   for (const r of data) {
      const bench = String(r.bench);
      const v = parseFloat(r.score);
      if (bench.startsWith('speed_pargen-')) {
         if (Number.isFinite(v)) setDepth(pargenByModel, baseModel(r.model), Number(bench.replace('speed_pargen-', '')), v);
      } else if (bench.startsWith('quality_decay-')) {
         if (Number.isFinite(v)) setDepth(qualityByModel, baseModel(r.model), depthOf(bench, 'quality_decay-'), v);
      } else if (bench.startsWith('ttft-')) {
         if (Number.isFinite(v)) setDepth(ttftByModel, baseModel(r.model), depthOf(bench, 'ttft-'), v);
      } else if (bench.startsWith('e2e-')) {
         if (Number.isFinite(v)) setDepth(e2eByModel, baseModel(r.model), depthOf(bench, 'e2e-'), v);
      } else if (bench === 'struct_output') {
         if (Number.isFinite(v)) structByModel.set(baseModel(r.model), v);
      } else if (bench === 'instruction_following') {
         if (Number.isFinite(v)) ifByModel.set(baseModel(r.model), v);
      } else if (bench === 'agentic_loop') {
         if (Number.isFinite(v)) {
            agenticByModel.set(baseModel(r.model), v);
            const sm = /steps\s+([\d.]+)/.exec(r.notes ?? '');
            if (sm) agenticStepsByModel.set(baseModel(r.model), Number(sm[1]));
         }
      } else if (bench === 'prefix_cache_warm_ms') {
         if (Number.isFinite(v)) {
            const cm = /cold\s+([\d.]+)/.exec(r.notes ?? '');
            const sm = /speedup\s+([\d.]+)/.exec(r.notes ?? '');
            prefixCacheByModel.set(baseModel(r.model), {
               warm: v,
               cold: cm ? Number(cm[1]) : null,
               speedup: sm ? Number(sm[1]) : null,
            });
         }
      } else if (bench === 'power_eff') {
         if (Number.isFinite(v)) powerEffByModel.set(baseModel(r.model), v);
      } else if (bench === 'kv_per_tok') {
         // kv-probe stores KiB/token in `score`; fleet wants MiB/token.
         if (Number.isFinite(v) && v > 0) kvPerTokByModel.set(baseModel(r.model), v / 1024);
      } else if (bench === 'coding_multipl') {
         const tr = /tests\s+([\d.]+)%/.exec(r.notes ?? '');
         if (Number.isFinite(v) || tr) {
            codingByMT.set(`${baseModel(r.model)}|${r.think}`, {
               pass1: Number.isFinite(v) ? v : null,
               testRate: tr ? Number(tr[1]) : null,
            });
         }
      }
      if (r.bench === 'maxctx') {
         if (Number.isFinite(v)) maxctxByModel.set(baseModel(r.model), v);
         const vram = parseFloat(r.vram_mib);
         if (Number.isFinite(vram)) maxctxVramByModel.set(baseModel(r.model), vram);
      } else if (bench.startsWith('speed_decay-')) {
         const depth = Number(bench.replace('speed_decay-', '').replace('k', '')) * 1024;
         if (Number.isFinite(v)) setDepth(decayByModel, baseModel(r.model), depth, v);
      }
   }

   const modelMap = new Map();
   for (const r of data) {
      if (isSharedBench(r.bench)) continue;
      const key = `${r.model}|${r.think}`;
      if (!modelMap.has(key)) modelMap.set(key, { model: r.model, think: r.think, rows: [] });
      modelMap.get(key).rows.push(r);
   }

   const latestScore = (rs, bench) => {
      const m = rs
         .filter((r) => r.bench === bench)
         .map((r) => parseFloat(r.score))
         .filter(Number.isFinite);
      return m.length ? m[m.length - 1] : null;
   };

   const W_CODE_PASS1 = 0.4;
   const W_CODE_TESTRATE = 0.6;
   const codingGradeOf = (base) => {
      for (const st of ['no_think', 'n/a']) {
         const c = codingByMT.get(`${base}|${st}`);
         if (c && (c.pass1 != null || c.testRate != null)) {
            return W_CODE_PASS1 * (c.pass1 ?? 0) + W_CODE_TESTRATE * (c.testRate ?? 0);
         }
      }
      return null;
   };

   const models = [...modelMap.values()]
      .map(({ model, think, rows: rs }) => {
         const base = baseModel(model);
         const maxctx = maxctxByModel.get(base) ?? null;
         const maxctxVram = maxctxVramByModel.get(base) ?? null;
         const triage = latestScore(rs, 'triage');
         const reasoning = latestScore(rs, 'reasoning');
         const toolcall = latestScore(rs, 'toolcalling');
         const summ = latestScore(rs, 'summarization');
         const docqa = latestScore(rs, 'docqa');
         const speedTg =
            Math.max(latestScore(rs, 'speed_short') ?? 0, latestScore(rs, 'speed_long-32k') ?? 0, latestScore(rs, 'speed') ?? 0) || null;
         const latestField = (bench, field) => {
            const m = rs
               .filter((r) => r.bench === bench)
               .map((r) => parseFloat(r[field]))
               .filter(Number.isFinite);
            return m.length ? m[m.length - 1] : null;
         };
         const prefill4k = latestField('speed_prefill-4k', 'prefill_tps');
         const prefill12k = latestField('speed_prefill-12k', 'prefill_tps');
         const endToEnd = (P, pf) => (pf && speedTg ? (P + 512) / (P / pf + 512 / speedTg) : null);
         const total4k = endToEnd(4096, prefill4k);
         const total12k = endToEnd(12288, prefill12k);
         const e2e = [total4k, total12k].filter(Number.isFinite);
         const totalE2E = e2e.length ? e2e.reduce((a, b) => a + b, 0) / e2e.length : speedTg;
         const decayMap = decayByModel.get(base);
         const decayCurve = decayMap
            ? [...decayMap.entries()].map(([depth, dec]) => ({ depth, decode: dec })).sort((a, b) => a.depth - b.depth)
            : [];
         const decodeBase = decayMap?.get(0) ?? null;
         const refPt = [...decayCurve].filter((x) => x.depth > 0 && x.depth <= 32768).pop() ?? null;
         const decodeRef = refPt?.decode ?? null;
         const decodeRefDepth = refPt?.depth ?? null;
         const decodeRetentionPct = decodeBase && decodeRef ? Math.min(100, Math.round((decodeRef / decodeBase) * 100)) : null;
         const pgMap = pargenByModel.get(base);
         const pargenCurve = pgMap ? [...pgMap.entries()].map(([conc, tps]) => ({ conc, tps })).sort((a, b) => a.conc - b.conc) : [];
         const pargen1 = pgMap?.get(1) ?? null;
         const pargenMaxK = pargenCurve.length ? pargenCurve[pargenCurve.length - 1].conc : null;
         const pargenAggMax = pargenCurve.length ? pargenCurve[pargenCurve.length - 1].tps : null;
         const pargenSpeedup = pargen1 && pargenAggMax ? Math.round((pargenAggMax / pargen1) * 100) / 100 : null;
         const qMap = qualityByModel.get(base);
         const qualityCurve = qMap ? [...qMap.entries()].map(([depth, acc]) => ({ depth, acc })).sort((a, b) => a.depth - b.depth) : [];
         const qualityBase = qMap?.get(0) ?? null;
         const qRef = [...qualityCurve].filter((x) => x.depth > 0 && x.depth <= 32768).pop() ?? null;
         const qualityRetentionPct = qualityBase && qRef?.acc != null ? Math.min(100, Math.round((qRef.acc / qualityBase) * 100)) : null;
         const tMap = ttftByModel.get(base);
         const ttftCurve = tMap ? [...tMap.entries()].map(([depth, ms]) => ({ depth, ms })).sort((a, b) => a.depth - b.depth) : [];
         const ttftRefPt = [...ttftCurve].filter((x) => x.depth > 0 && x.depth <= 32768).pop() ?? null;
         const ttftRefMs = ttftRefPt?.ms ?? null;
         const ttft8kMs = tMap?.get(8192) ?? null;
         const e2eMap = e2eByModel.get(base);
         const e2eCurve = e2eMap ? [...e2eMap.entries()].map(([depth, tps]) => ({ depth, tps })).sort((a, b) => a.depth - b.depth) : [];

const $ = (id) => document.getElementById(id);
const fmt = (n,d=1) => (n==null||!isFinite(n))?'–':Number(n).toFixed(d);
const pct = (n) => (n==null||!isFinite(n))?'–':(n*100).toFixed(1)+'%';
const esc = (s) => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
// Capability-rank star badges (top 5): rank 1 → ★★★★★ … rank 5 → ★☆☆☆☆. Shown in every table.
let CAPRANK={};
const mkey=(m)=>m.model+'|'+m.think;
function stars(rank){ if(!rank||rank>5) return ''; let s=''; for(let i=0;i<5;i++) s+=(i<(6-rank)?'★':'☆'); return '<span class="stars" title="capability rank #'+rank+'">'+s+'</span>'; }
const topClass=(m)=>CAPRANK[mkey(m)]?'top5':'';
function num(id,def){ const e=$(id); if(!e) return def; const v=parseFloat(e.value); return isFinite(v)?v:def; }
function getDials(){
  const d = JSON.parse(JSON.stringify(DATA.defaultDials));
  for (const g of ['comprehension','coding']){
    if (d[g].strength!==undefined) d[g].strength = num('d_'+g+'_strength', d[g].strength);
    for (const k in d[g].weights) d[g].weights[k] = num('d_w_'+g+'_'+k, d[g].weights[k]);
  }
  for (const k in d.speed.weights) d.speed.weights[k] = num('d_w_speed_'+k, d.speed.weights[k]);
  for (const k in d.fleet) d.fleet[k] = num('d_fleet_'+k, d.fleet[k]);
  return d;
}
function table(headers, rows, rowClasses){
  let h='<table><thead><tr>';
  for (const x of headers) h+='<th>'+esc(x)+'</th>';
  h+='</tr></thead><tbody>';
  rows.forEach((r,i)=>{ const cls=(rowClasses&&rowClasses[i])?' class="'+rowClasses[i]+'"':''; h+='<tr'+cls+'>'; for (const c of r) h+='<td>'+(c==null?'':c)+'</td>'; h+='</tr>'; });
  return h+'</tbody></table>';
}
function renderEnv(){
  const e=DATA.environment;
  const s = e ? ('runner '+esc(e.runner)+' · '+esc(e.gpu)+' · '+esc(e.backend)+' · fa='+esc(e.server_flags&&e.server_flags.flash_attn)+' · kv='+esc(e.server_flags&&e.server_flags.cache_type_k)) : 'no server fingerprint (pre-fingerprint data)';
  $('env').innerHTML = s+' · sources: '+DATA.sources.map(esc).join(', ');
  const envs=DATA.environments.filter(Boolean); let consistent=true;
  for (let i=1;i<envs.length;i++){ if (JSON.stringify(envs[i])!==JSON.stringify(envs[0])) consistent=false; }
  $('banner').innerHTML = consistent ? '' : '<div class="warn">⚠ merged runs have different server configs — numbers may not be comparable.</div>';
}
function recompute(){
  const dials=getDials();
  const ranking=scoreGroups(DATA.models, dials);
  // Capability rank drives the star badges shown in EVERY table (top 5 only).
  CAPRANK={}; ranking.forEach((m,i)=>{ if(i<5) CAPRANK[mkey(m)]=i+1; });
  const fleetRes=computeFleet(DATA.models, dials);
  renderCap(ranking); renderFleet(fleetRes); renderCtx(); renderBreakdown(); renderRequired(dials);
}
function renderCap(ranking){
  const rows=ranking.map((m,i)=>[i+1, stars(i+1), esc(m.label), fmt(m.score), pct(m.comprehension), pct(m.coding), pct(m.codingCompetence)]);
  $('cap').innerHTML=table(['#','★','model','capability','comprehension','coding','competence'], rows, ranking.map(topClass));
}
function renderFleet(res){
  // Ranked by the blended fleet_suitability score: capability^w_cap × ctx_norm^w_ctx ×
  // slots_norm^w_slots × throughput^w_thru. Capability dominates (w_cap=2 default) so
  // capable all-rounders rise, while context reach (ctx clamped at the 100k tier) and
  // slot count strongly modulate. Tune the exponents in the fleet dials at left.
  const fv=(p)=>p.fleet_suitability==null?-Infinity:p.fleet_suitability;
  const sorted=res.fleet.slice().sort((a,b)=>fv(b)-fv(a));
  const mainCtx=(p)=>p.main_ctx==null?'–':p.main_ctx.toLocaleString();
  const workers=(p)=>p.n_workers==null?'–':('+'+p.n_workers+'×'+Math.round((p.worker_ctx||0)/1024)+'k');
  const rows=sorted.map((p,i)=>{
    const st=stars(CAPRANK[mkey(p)]);
    const fleetCell=p.fleet_suitability==null?'<span class="dim">'+esc(p.reason||'–')+'</span>':fmt(p.fleet_suitability,3);
    return [i+1, st, esc(p.label), pct(p.capability), fleetCell, mainCtx(p), workers(p), p.agg_tps==null?'–':fmt(p.agg_tps,0), pct(p.capacity_norm), pct(p.latency_norm)];
  });
  $('fleet').innerHTML=table(['#','★','model','cap','fleet','main ctx','+workers','agg tok/s','capacity','latency'], rows, sorted.map(topClass));
}
function renderCtx(){
  const list=DATA.models.slice().filter(m=>m.maxctx).sort((a,b)=>(b.maxctx||0)-(a.maxctx||0));
  const rows=list.map(m=>[stars(CAPRANK[mkey(m)]), esc(m.label), m.maxctx.toLocaleString(), m.maxctxVram==null?'–':Math.round(m.maxctxVram)+'M', m.kvPerTokMiB==null?'–':(m.kvPerTokMiB*1024).toFixed(1)]);
  $('ctx').innerHTML=table(['★','model','max ctx','vram@max','KV KiB/tok'], rows, list.map(topClass));
}
const BKEYS=['triage','summarization','docqa','reasoning','grade','agentic_loop','instruction_following','toolcalling','struct_output','e2e_throughput','cold_ttft','warm_ttft'];
function renderBreakdown(){
  const list=DATA.models.slice().sort((a,b)=>(b.capability==null?-1:b.capability)-(a.capability==null?-1:a.capability));
  const rows=list.map(m=>[stars(CAPRANK[mkey(m)]), esc(m.label)].concat(BKEYS.map(k=> m.norm[k]==null?'<span class="dim">–</span>':pct(m.norm[k]))));
  $('breakdown').innerHTML=table(['★','model'].concat(BKEYS), rows, list.map(topClass));
}
function renderRequired(dials){
  const used=new Set();
  for (const g of ['comprehension','coding','speed']) for (const k in (dials[g].weights||{})) if (dials[g].weights[k]>0) used.add(k);
  ['toolcalling','struct_output'].forEach(k=>used.add(k));
  DATA.fleetRequired.forEach(k=>used.add(k));
  const byRunner={};
  for (const k of used){ const e=DATA.registry[k]; if(!e) continue; byRunner[e.runner]=byRunner[e.runner]||{command:e.command,metrics:new Set(),missing:new Set()}; byRunner[e.runner].metrics.add(k); }
  for (const base in DATA.coverage){ for (const k of DATA.coverage[base].missing){ if(used.has(k)){ const e=DATA.registry[k]; if(e&&byRunner[e.runner]) byRunner[e.runner].missing.add(base); } } }
  let h='<table><thead><tr><th>runner</th><th>command</th><th>feeds</th><th>missing for</th></tr></thead><tbody>';
  for (const r in byRunner){ const o=byRunner[r]; const miss=[...o.missing]; h+='<tr><td>'+esc(r)+'</td><td><code>'+esc(o.command)+'</code></td><td>'+[...o.metrics].map(esc).join(', ')+'</td><td>'+(miss.length?('<span class="warn-t">'+miss.length+': '+miss.map(esc).join(', ')+'</span>'):'<span class="ok-t">complete</span>')+'</td></tr>'; }
  $('required').innerHTML=h+'</tbody></table>';
}
const RAWOF={triage:'triage',summarization:'summ',docqa:'docqa',reasoning:'reasoning',grade:'codingGrade',agentic_loop:'agenticScore',instruction_following:'ifScore',toolcalling:'toolcall',struct_output:'structScore',e2e_throughput:'e2eThroughput',cold_ttft:'ttft8kMs',decode_retention:'decodeRetentionPct',maxctx:'maxctx'};
function exportCSV(){
  const keys=BKEYS.concat(['decode_retention','maxctx']);
  const lines=['model,think,metric,raw,norm'];
  for (const m of DATA.models){ for (const k of keys){ const norm=m.norm[k]; let raw=RAWOF[k]?m[RAWOF[k]]:(k==='warm_ttft'?(m.prefixCache&&m.prefixCache.warm):null); lines.push([JSON.stringify(m.model),JSON.stringify(m.think),k,(raw==null?'':raw),(norm==null?'':norm)].join(',')); } }
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='dashboard-data.csv'; a.click();
}
function resetDials(){
  const d=DATA.defaultDials;
  const set=(id,v)=>{ const e=$(id); if(e){ e.value=v; const o=$(id+'_out'); if(o)o.textContent=v; } };
  for (const g of ['comprehension','coding']){ if(d[g].strength!==undefined) set('d_'+g+'_strength', d[g].strength); for(const k in d[g].weights) set('d_w_'+g+'_'+k, d[g].weights[k]); }
  for (const k in d.speed.weights) set('d_w_speed_'+k, d.speed.weights[k]);
  for (const k in d.fleet) set('d_fleet_'+k, d.fleet[k]);
}
function wire(){
  document.querySelectorAll('.dial').forEach(inp=>{ inp.addEventListener('input', ()=>{ const o=$(inp.id+'_out'); if(o)o.textContent=inp.value; recompute(); }); });
  $('reset').addEventListener('click', ()=>{ resetDials(); recompute(); });
  $('csv').addEventListener('click', exportCSV);
}
renderEnv(); wire(); recompute();

</script></body></html>
