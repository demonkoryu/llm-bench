# Publishes the self-contained benchmark dashboard to Forgejo Pages.
# On every push to main that touches the dashboard, copy results/dashboard.html
# to index.html and force-push it to the `pages` branch, which the pages-server
# serves at https://llm-bench.demonkoryu.pages.xor0.de
#
# Self-contained: clones via PAGES_TOKEN in a plain run step rather than using
# actions/checkout, so the job has no dependency on an external action registry.
name: pages
on:
  push:
    branches: [main]
    paths: [results/dashboard.html, .forgejo/workflows/pages.yml]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.PAGES_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Build & push pages branch
        run: |
          set -euo pipefail
          remote="https://forgejo-actions:${TOKEN}@git.xor0.de/${REPO}.git"
          git clone --depth 1 --branch main "$remote" src
          test -f src/results/dashboard.html
          mkdir site
          cp src/results/dashboard.html site/index.html
          cd site
          git init -q -b pages
          git config user.name  "forgejo-actions"
          git config user.email "actions@git.xor0.de"
          git add index.html
          git commit -q -m "Deploy dashboard"
          git push -q --force "$remote" pages
