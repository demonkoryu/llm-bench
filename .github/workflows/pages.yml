name: Deploy dashboard to Pages

# Publishes the self-contained benchmark dashboard (results/dashboard.html) to
# GitHub Pages as the site index, so it is browsable at
# https://demonkoryu.github.io/llm-bench/ — always in sync with what's on main.
#
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - results/dashboard.html
      - results/chart.svg
      - results/chart.png
      - results/fleet.svg
      - results/fleet.png
      - results/report.json
      - .github/workflows/pages.yml
  workflow_dispatch: {}

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp results/dashboard.html _site/index.html
          # Also expose the standalone artifacts for direct/deep links.
          cp -f results/chart.svg results/chart.png results/fleet.svg results/fleet.png results/report.json _site/ 2>/dev/null || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
