<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>llm-bench explorer</title>
<style>
  :root{
    --bg:#0f1214; --panel:#161b1e; --panel2:#1b2226; --ink:#e7ebed; --dim:#8a949b; --faint:#5c666c;
    --line:#262f34; --line2:#36424a; --accent:#2bd0be; --accent2:#0f8f82;
    --win:#54c17c; --winbg:#16281d; --loss:#e5697b; --lossbg:#2c161b; --tie:#6f7a81;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  @media (prefers-color-scheme: light){:root{--bg:#eef1f3;--panel:#fff;--panel2:#f6f8f9;--ink:#161a1d;--dim:#4a555c;--faint:#8b979d;--line:#dde3e7;--line2:#c7d0d6;--accent:#0f8f82;--accent2:#0b6f65;--win:#2f8f54;--winbg:#e6f3ea;--loss:#c53f52;--lossbg:#fbe8ec;--tie:#8a949b}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;display:grid;grid-template-columns:250px 1fr;height:100vh;overflow:hidden}
  /* facet rail */
  aside{background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:14px}
  aside h1{font-size:13px;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--accent2);margin:0 0 4px}
  aside .sub{font-size:11px;color:var(--faint);margin-bottom:12px;font-family:var(--mono)}
  .facet{margin-bottom:10px;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .facet>summary{cursor:pointer;padding:7px 10px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);background:var(--panel2);list-style:none;display:flex;justify-content:space-between}
  .facet>summary::-webkit-details-marker{display:none}
  .facet .opts{padding:6px 10px;display:flex;flex-direction:column;gap:3px}
  .facet label{display:flex;gap:7px;align-items:center;font-size:12.5px;cursor:pointer}
  .facet .cnt{color:var(--faint);font-family:var(--mono);font-size:10px}
  aside button{width:100%;margin-top:6px;background:var(--panel2);color:var(--ink);border:1px solid var(--line2);border-radius:7px;padding:7px;cursor:pointer;font-family:var(--mono);font-size:11px}
  /* main */
  main{overflow:auto;padding:18px 22px}
  .tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--line)}
  .tabs button{background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);padding:8px 14px;cursor:pointer;font-family:var(--mono);font-size:12px;letter-spacing:.04em}
  .tabs button.on{color:var(--accent);border-bottom-color:var(--accent)}
  .ctrls{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:14px}
  .ctrls label{display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}
  select{background:var(--panel2);color:var(--ink);border:1px solid var(--line2);border-radius:6px;padding:5px 8px;font-family:var(--mono);font-size:12px}
  table{border-collapse:collapse;font-size:13px;width:100%}
  th,td{text-align:left;padding:7px 12px;border-bottom:1px solid var(--line)}
  th{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
  td.num,th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
  .chip{font-family:var(--mono);font-size:11px;padding:1px 6px;border-radius:999px}
  .chip.win{color:var(--win);background:var(--winbg)} .chip.loss{color:var(--loss);background:var(--lossbg)} .chip.tie{color:var(--tie)}
  .cap{font-family:var(--mono);font-weight:600}
  .cov{width:22px;height:16px;border-radius:3px;display:inline-block}
  .cov.y{background:var(--accent2)} .cov.n{background:var(--line)}
  #pareto{background:var(--panel);border:1px solid var(--line);border-radius:10px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:8px}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .muted{color:var(--faint);font-family:var(--mono);font-size:12px}
  .tip{position:fixed;pointer-events:none;background:var(--panel);border:1px solid var(--line2);border-radius:6px;padding:6px 9px;font-family:var(--mono);font-size:11px;box-shadow:0 4px 16px rgba(0,0,0,.3);display:none;z-index:9}
</style>
</head>
<body>
<aside>
  <h1>llm-bench</h1>
  <div class="sub" id="rowcount">loading…</div>
  <div id="facets"></div>
  <button id="clear">clear facets</button>
</aside>
<main>
  <div class="tabs" id="tabs"></div>
  <div class="ctrls" id="ctrls"></div>
  <div id="view"></div>
</main>
<div class="tip" id="tip"></div>
<script src="/app.js"></script>
</body>
</html>
