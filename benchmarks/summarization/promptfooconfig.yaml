# Summarization / categorization benchmark.
# expected_area, tags_prefix, must_mention live in summcases.mjs (avoids array expansion).

description: "Summarization and categorization quality"

providers:
   - id: "file://../../shared/promptfoo-ollama-provider.mjs"
     label: "ollama-summarization"

defaultTest:
   assert:
      - type: javascript
        value: "file://grader.mjs"

prompts:
   - id: summarization-prompt
     raw: |
        [
          {"role":"system","content":"You are summarizing and categorizing content for a personal knowledge vault.\nThe vault has 4 areas: craft (software, AI, hardware, PKM), finance (trading, markets), music (DJing, production), work (career, employer).\n\nRespond with JSON only:\n{\n  \"summary\": \"<1-2 sentence factual summary>\",\n  \"area\": \"<craft|finance|music|work>\",\n  \"tags\": [\"<area/subtag>\", ...]\n}"},
          {"role":"user","content":"Title: {{title}}\n\n{{content}}"}
        ]

tests:
   - vars:
        case_id: rag-paper
        title: Agentic RAG whitepaper
        content: |
           Covers multi-step reasoning with retrieval, tool use, and LLM orchestration.
           Describes how agents decompose queries into sub-tasks, retrieve relevant
           context at each step, and synthesize answers using chained tool calls.
   - vars:
        case_id: trance-compression
        title: Sidechain compression for trance pumping
        content: |
           Classic trance pumping effect: sidechain a compressor on bass and pads
           keyed to the kick drum. Attack 0.1ms, release 80-150ms for the pump feel.
           Ghost kick sidechain keeps it in time without audible kick bleed.
   - vars:
        case_id: trading-0dte
        title: 0DTE options theta decay
        content: |
           Zero-days-to-expiry SPX options accelerate theta decay after 2pm.
           Selling premium after 2pm captures the steepest part of the intraday
           theta curve but gamma risk is highest in the last 30 minutes.
   - vars:
        case_id: qmk-debounce
        title: Keyboard debouncing in QMK firmware
        content: |
           QMK supports eager, defer-until-idle, and sym_eager_pk debounce algorithms.
           Eager fires immediately on press and delays release; sym_eager_pk is best
           for per-key debounce on split keyboards with noisy switches.
   - vars:
        case_id: zettelkasten
        title: Zettelkasten vs folder hierarchies for PKM
        content: |
           Dense bidirectional links between atomic notes outperform deep folder
           hierarchies for knowledge retrieval. Each note has exactly one idea;
           links surface unexpected connections better than any taxonomy.
   - vars:
        case_id: salary-negotiation
        title: Negotiating a senior engineer offer
        content: |
           Anchor high on total compensation including equity refresh. Use competing
           offers as leverage. Recruiter call script: confirm base, then move to
           signing bonus and RSU refresh before benefits.
