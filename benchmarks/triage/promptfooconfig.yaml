# Triage benchmark — rule-compliance against 18 golden inbox items.
#
# Each test case sends one golden item to the model and evaluates the
# JSON response via the custom scriptPath grader (triage-rubric.mjs).
#
# Providers are injected at runtime by run-suite.mjs based on the model matrix.
# This file defines the test structure; models are not hardcoded here.

description: "Triage rule-compliance — 18 golden items"

defaultTest:
   options:
      provider:
         # Overridden per-model by run-suite.mjs; placeholder shown here.
         id: "ollama:qwen3.5:4b"
         config:
            temperature: 0.7
            top_p: 0.8
            top_k: 20
            presence_penalty: 1.5
            num_ctx: 4096

tests:
   - vars:
        item_id: "craft-ai-rag"
        item_title: "Agentic RAG whitepaper"
        item_content: "Whitepaper on Agentic Retrieval-Augmented Generation. Covers multi-step reasoning with retrieval, tool use, and LLM orchestration."
   - vars:
        item_id: "craft-software-howto"
        item_title: "How to profile Python and Rust programs"
        item_content: "A guide to profiling CPU-bound Python code with cProfile and Rust with cargo flamegraph. Includes tips for reading flamegraphs."
   - vars:
        item_id: "finance-trading"
        item_title: "Analyze premarket direction reversal"
        item_content: "Strategy for identifying when premarket direction is likely to reverse at the open. Uses volume delta and level 2 tape reading."
   - vars:
        item_id: "music-no-anchor"
        item_title: "Access Virus KB Get sound A77"
        item_content: "Reference for getting the A77 patch sound from the Access Virus KB synthesizer. Includes parameter settings and MIDI CC map."
   - vars:
        item_id: "craft-hardware"
        item_title: "Keyboard debouncing algorithms for custom firmware"
        item_content: "Overview of keyboard debounce algorithms: eager, defer-until-idle, and Roland eager-pr. Relevant for QMK and ZMK custom keyboard firmware."
   - vars:
        item_id: "craft-mind"
        item_title: "A Three-Level System for Organizing Information in PKM"
        item_content: "Introduces a three-level hierarchy (Topics, Classes, Tags) for personal knowledge management. Contrasts with flat tag systems and PARA."
   - vars:
        item_id: "dismiss-stub"
        item_title: "test123"
        item_content: "asdf test note ignore"
   - vars:
        item_id: "ambiguous-url"
        item_title: "2026-05-24"
        item_content: "https://example.com/some-article-2024"
   - vars:
        item_id: "work-no-anchor"
        item_title: "Q3 performance review template"
        item_content: "Template for writing the self-assessment section of a Q3 performance review. Covers achievements, growth areas, and OKR alignment."
   - vars:
        item_id: "craft-ai-mcp"
        item_title: "Model Context Protocol server design patterns"
        item_content: "Patterns for building MCP servers: tool granularity, structured output via JSON schema, OAuth + PKCE auth, and stateless HTTP transport."
   - vars:
        item_id: "finance-options"
        item_title: "0DTE options theta decay curve"
        item_content: "How theta decay accelerates intraday for zero-days-to-expiry SPX options, and why selling premium after 2pm has a different risk profile."
   - vars:
        item_id: "music-production"
        item_title: "Sidechain compression for trance pumping"
        item_content: "Technique for the classic trance pumping effect: sidechain a compressor on the bass and pads keyed to the kick. Covers attack/release tuning."
   - vars:
        item_id: "work-career"
        item_title: "Negotiating a senior engineer offer"
        item_content: "Notes on negotiating a senior software engineer offer: anchoring on total comp, equity refresh, competing offers, and the recruiter call script."
   - vars:
        item_id: "craft-hardware-cnc"
        item_title: "CNC feeds and speeds for 6061 aluminum"
        item_content: "Calculating feeds and speeds for milling 6061 aluminum: chip load per tooth, surface speed, and avoiding recutting chips with proper coolant."
   - vars:
        item_id: "craft-mind-zettel"
        item_title: "Zettelkasten linking vs folder hierarchies"
        item_content: "Argues that dense bidirectional links between atomic notes outperform deep folder hierarchies for knowledge retrieval and serendipitous connection."
   - vars:
        item_id: "spawn-task-domain"
        item_title: "Renew xor0.de domain before it expires"
        item_content: "Action: renew the xor0.de domain registration and verify the Cloudflare Tunnel cert before the 2026-07-15 expiry, or obsidian-mcp goes down."
   - vars:
        item_id: "craft-project-rag"
        item_title: "Build a local RAG pipeline over the vault"
        item_content: "Plan: index all Obsidian notes with nomic-embed, store vectors locally, and answer questions over the vault via qwen3.5 with retrieval. Multi-week build."
   - vars:
        item_id: "dismiss-dup"
        item_title: "Untitled 3"
        item_content: "aaa\n\nnote to self lorem ipsum placeholder do not keep"

# Prompt template — mirrors buildTriagePrompt() in wispTools.ts
prompt:
   - role: system
     content: "file://../../shared/triage-prompt.mjs#TRIAGE_STATIC_PROMPT"
   - role: user
     content: "Title: {{item_title}}\nContent preview:\n{{item_content}}"

assert:
   - type: javascript
     value: "file://grader.mjs"
